openapi: 3.1.0
info:
  title: audit.v1
paths:
  /audit.v1.AuditService/RecordEvent:
    post:
      tags:
        - audit.v1.AuditService
      summary: RecordEvent
      operationId: audit.v1.AuditService.RecordEvent
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/audit.v1.RecordEventRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/audit.v1.RecordEventResponse'
  /audit.v1.AuditService/QueryEvents:
    post:
      tags:
        - audit.v1.AuditService
      summary: QueryEvents
      operationId: audit.v1.AuditService.QueryEvents
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/audit.v1.QueryEventsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/audit.v1.QueryEventsResponse'
  /audit.v1.AuditService/ExportEvents: {}
components:
  schemas:
    audit.v1.Actor:
      type: object
      properties:
        id:
          type: string
          title: id
        type:
          type: string
          title: type
        email:
          type: string
          title: email
        ipAddress:
          type: string
          title: ip_address
        userAgent:
          type: string
          title: user_agent
        service:
          type: string
          title: service
        deviceId:
          type: string
          title: device_id
      title: Actor
      additionalProperties: false
      description: |-
        Actor identifies who performed an action.
         Unifies the actor concept across chat's AuditEvent, gate's AuditEntry,
         and the standalone audit service's RecordEventRequest.
    audit.v1.Event:
      type: object
      properties:
        eventId:
          type: string
          title: event_id
        timestamp:
          title: timestamp
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        actor:
          title: actor
          $ref: '#/components/schemas/audit.v1.Actor'
        resource:
          title: resource
          $ref: '#/components/schemas/audit.v1.Resource'
        action:
          type: string
          title: action
        organizationId:
          type: string
          title: organization_id
        workspaceId:
          type: string
          title: workspace_id
        outcome:
          type: string
          title: outcome
        errorMessage:
          type: string
          title: error_message
        beforeState:
          type: string
          title: before_state
        afterState:
          type: string
          title: after_state
        dataClassification:
          type: string
          title: data_classification
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
        checksum:
          type: string
          title: checksum
          description: Tamper-evidence chain
        previousEventId:
          type: string
          title: previous_event_id
      title: Event
      additionalProperties: false
      description: Event is the canonical audit event.
    audit.v1.Event.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    audit.v1.ExportEventsRequest:
      type: object
      properties:
        organizationId:
          type: string
          title: organization_id
        startTime:
          title: start_time
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        endTime:
          title: end_time
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        format:
          type: string
          title: format
        includeStateChanges:
          type: boolean
          title: include_state_changes
        exportReason:
          type: string
          title: export_reason
      title: ExportEventsRequest
      additionalProperties: false
    audit.v1.ExportEventsResponse:
      type: object
      properties:
        data:
          type: string
          title: data
          format: byte
        contentType:
          type: string
          title: content_type
        filename:
          type: string
          title: filename
      title: ExportEventsResponse
      additionalProperties: false
    audit.v1.QueryEventsRequest:
      type: object
      properties:
        organizationId:
          type: string
          title: organization_id
        startTime:
          title: start_time
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        endTime:
          title: end_time
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        actorId:
          type: string
          title: actor_id
        actorType:
          type: string
          title: actor_type
        action:
          type: string
          title: action
        resourceType:
          type: string
          title: resource_type
        resourceId:
          type: string
          title: resource_id
        outcome:
          type: string
          title: outcome
        limit:
          type: integer
          title: limit
          format: int32
        offset:
          type: integer
          title: offset
          format: int32
        includeStateChanges:
          type: boolean
          title: include_state_changes
      title: QueryEventsRequest
      additionalProperties: false
    audit.v1.QueryEventsResponse:
      type: object
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/audit.v1.Event'
          title: events
        total:
          type: integer
          title: total
          format: int32
      title: QueryEventsResponse
      additionalProperties: false
    audit.v1.RecordEventRequest:
      type: object
      properties:
        actor:
          title: actor
          $ref: '#/components/schemas/audit.v1.Actor'
        resource:
          title: resource
          $ref: '#/components/schemas/audit.v1.Resource'
        action:
          type: string
          title: action
        organizationId:
          type: string
          title: organization_id
        workspaceId:
          type: string
          title: workspace_id
        outcome:
          type: string
          title: outcome
        errorMessage:
          type: string
          title: error_message
        beforeState:
          type: string
          title: before_state
        afterState:
          type: string
          title: after_state
        dataClassification:
          type: string
          title: data_classification
        metadata:
          type: object
          title: metadata
          additionalProperties:
            type: string
            title: value
        requestId:
          type: string
          title: request_id
        traceId:
          type: string
          title: trace_id
      title: RecordEventRequest
      additionalProperties: false
    audit.v1.RecordEventRequest.MetadataEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: MetadataEntry
      additionalProperties: false
    audit.v1.RecordEventResponse:
      type: object
      properties:
        eventId:
          type: string
          title: event_id
        timestamp:
          title: timestamp
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        checksum:
          type: string
          title: checksum
      title: RecordEventResponse
      additionalProperties: false
    audit.v1.Resource:
      type: object
      properties:
        type:
          type: string
          title: type
        id:
          type: string
          title: id
        name:
          type: string
          title: name
      title: Resource
      additionalProperties: false
      description: Resource identifies what was acted upon.
    google.protobuf.Timestamp:
      type: string
      examples:
        - 1s
        - 1.000340012s
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
        debug:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
security: []
tags:
  - name: audit.v1.AuditService
    description: |-
      AuditService records and queries audit events across EvalOps services.
       This is the cross-service audit contract. Gate and chat each have their own
       domain-specific audit protos that extend these base types.
