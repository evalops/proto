          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.HandleTriggerResponse'
  /workflows.v1.WorkflowService/GetRun:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: GetRun
      description: GetRun retrieves a workflow run by ID.
      operationId: workflows.v1.WorkflowService.GetRun
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
