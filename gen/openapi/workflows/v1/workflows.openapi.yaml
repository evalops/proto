            schema:
              $ref: '#/components/schemas/workflows.v1.GetDefinitionRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.GetDefinitionResponse'
  /workflows.v1.WorkflowService/ListDefinitions:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: ListDefinitions
      description: ListDefinitions returns workflow definitions matching the query filters.
      operationId: workflows.v1.WorkflowService.ListDefinitions
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
