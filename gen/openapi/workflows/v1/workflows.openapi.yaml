    post:
      tags:
        - workflows.v1.WorkflowService
      summary: ResumeRun
      description: ResumeRun resumes a paused workflow.
      operationId: workflows.v1.WorkflowService.ResumeRun
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflows.v1.ResumeRunRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.ResumeRunResponse'
  /workflows.v1.WorkflowService/CancelRun:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: CancelRun
      description: |-
        CancelRun terminates a workflow. In-progress steps are cancelled and
         no compensation is triggered.
      operationId: workflows.v1.WorkflowService.CancelRun
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflows.v1.CancelRunRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.CancelRunResponse'
  /workflows.v1.WorkflowService/CompensateRun:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: CompensateRun
      description: |-
        CompensateRun triggers the compensation path for a failed workflow,
         executing compensation steps in reverse topological order.
      operationId: workflows.v1.WorkflowService.CompensateRun
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflows.v1.CompensateRunRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.CompensateRunResponse'
components:
  schemas:
    google.protobuf.NullValue:
      type: string
      title: NullValue
      enum:
        - NULL_VALUE
      description: |-
        `NullValue` is a singleton enumeration to represent the null value for the
         `Value` type union.

         The JSON representation for `NullValue` is JSON `null`.
    workflows.v1.StepRunState:
      type: string
      title: StepRunState
      enum:
        - STEP_RUN_STATE_UNSPECIFIED
        - STEP_RUN_STATE_PENDING
        - STEP_RUN_STATE_RUNNING
        - STEP_RUN_STATE_WAITING
        - STEP_RUN_STATE_COMPLETED
        - STEP_RUN_STATE_FAILED
        - STEP_RUN_STATE_SKIPPED
        - STEP_RUN_STATE_COMPENSATED
        - STEP_RUN_STATE_CANCELLED
      description: StepRunState describes the lifecycle state of an individual step execution.
    workflows.v1.StepType:
      type: string
      title: StepType
      enum:
        - STEP_TYPE_UNSPECIFIED
        - STEP_TYPE_AGENT_ACTION
        - STEP_TYPE_APPROVAL_GATE
        - STEP_TYPE_GOVERNANCE_CHECK
        - STEP_TYPE_WAIT_FOR_EVENT
        - STEP_TYPE_BRANCH
        - STEP_TYPE_PARALLEL
        - STEP_TYPE_NOTIFICATION
        - STEP_TYPE_HUMAN_TASK
      description: StepType describes the semantic kind of a workflow step.
    workflows.v1.TriggerType:
      type: string
      title: TriggerType
      enum:
        - TRIGGER_TYPE_UNSPECIFIED
        - TRIGGER_TYPE_EVENT
        - TRIGGER_TYPE_SCHEDULE
        - TRIGGER_TYPE_MANUAL
        - TRIGGER_TYPE_WEBHOOK
        - TRIGGER_TYPE_WORKFLOW
      description: TriggerType describes what initiates a workflow run.
    workflows.v1.WorkflowState:
      type: string
      title: WorkflowState
      enum:
        - WORKFLOW_STATE_UNSPECIFIED
        - WORKFLOW_STATE_PENDING
        - WORKFLOW_STATE_RUNNING
        - WORKFLOW_STATE_PAUSED
        - WORKFLOW_STATE_COMPENSATING
        - WORKFLOW_STATE_COMPLETED
        - WORKFLOW_STATE_FAILED
        - WORKFLOW_STATE_CANCELLED
      description: WorkflowState describes the lifecycle state of a workflow run.
    google.protobuf.ListValue:
      type: object
      properties:
        values:
          type: array
          items:
            $ref: '#/components/schemas/google.protobuf.Value'
          title: values
          description: Repeated field of dynamically typed values.
      title: ListValue
      additionalProperties: false
      description: |-
        `ListValue` is a wrapper around a repeated field of values.

         The JSON representation for `ListValue` is JSON array.
    google.protobuf.Struct:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/google.protobuf.Value'
      description: |-
        `Struct` represents a structured data value, consisting of fields
         which map to dynamically typed values. In some languages, `Struct`
         might be supported by a native representation. For example, in
         scripting languages like JS a struct is represented as an
         object. The details of that representation are described together
         with the proto support for the language.

         The JSON representation for `Struct` is JSON object.
    google.protobuf.Struct.FieldsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          title: value
          $ref: '#/components/schemas/google.protobuf.Value'
      title: FieldsEntry
      additionalProperties: false
    google.protobuf.Timestamp:
      type: string
      examples:
        - 1s
        - 1.000340012s
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    google.protobuf.Value:
      oneOf:
        - type: "null"
        - type: number
        - type: string
        - type: boolean
        - type: array
        - type: object
          additionalProperties: true
      description: |-
        `Value` represents a dynamically typed value which can be either
         null, a number, a string, a boolean, a recursive struct value, or a
         list of values. A producer of value is expected to set one of these
         variants. Absence of any variant indicates an error.

         The JSON representation for `Value` is JSON value.
    workflows.v1.CancelRunRequest:
      type: object
      properties:
        id:
          type: string
          title: id
        reason:
          type: string
          title: reason
      title: CancelRunRequest
      additionalProperties: false
    workflows.v1.CancelRunResponse:
      type: object
      properties:
        run:
          title: run
          $ref: '#/components/schemas/workflows.v1.WorkflowRun'
      title: CancelRunResponse
      additionalProperties: false
    workflows.v1.CompensateRunRequest:
      type: object
      properties:
        id:
          type: string
          title: id
        reason:
          type: string
          title: reason
      title: CompensateRunRequest
      additionalProperties: false
    workflows.v1.CompensateRunResponse:
      type: object
      properties:
        run:
          title: run
          $ref: '#/components/schemas/workflows.v1.WorkflowRun'
      title: CompensateRunResponse
      additionalProperties: false
    workflows.v1.CreateDefinitionRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        name:
          type: string
          title: name
        description:
          type: string
          title: description
        tags:
          type: array
          items:
            type: string
          title: tags
      title: CreateDefinitionRequest
      additionalProperties: false
    workflows.v1.CreateDefinitionResponse:
      type: object
      properties:
        definition:
          title: definition
          $ref: '#/components/schemas/workflows.v1.WorkflowDefinition'
      title: CreateDefinitionResponse
      additionalProperties: false
    workflows.v1.Edge:
      type: object
      properties:
        fromStepId:
          type: string
          title: from_step_id
        toStepId:
          type: string
          title: to_step_id
        conditionExpr:
          type: string
          title: condition_expr
          description: |-
            Optional condition for BRANCH steps. When the from_step is a BRANCH,
             each outgoing edge has a condition_expr evaluated against the step's
             output. The first matching edge is followed.
        label:
          type: string
          title: label
          description: |-
            label for the edge, useful for debugging and visualization
             (e.g., "approved", "denied", "high-value", "default").
      title: Edge
      additionalProperties: false
      description: Edge defines a directed connection between two steps in the DAG.
    workflows.v1.GetDefinitionRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: GetDefinitionRequest
      additionalProperties: false
    workflows.v1.GetDefinitionResponse:
      type: object
      properties:
        definition:
          title: definition
          $ref: '#/components/schemas/workflows.v1.WorkflowDefinition'
      title: GetDefinitionResponse
      additionalProperties: false
    workflows.v1.GetRunRequest:
      type: object
      properties:
        id:
