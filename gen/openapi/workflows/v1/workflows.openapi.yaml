      tags:
        - workflows.v1.WorkflowService
      summary: StartRun
      description: StartRun begins execution of a workflow definition version.
      operationId: workflows.v1.WorkflowService.StartRun
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
