              schema:
                $ref: '#/components/schemas/workflows.v1.GetRunResponse'
  /workflows.v1.WorkflowService/ListRuns:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: ListRuns
      description: ListRuns returns workflow runs matching the query filters.
      operationId: workflows.v1.WorkflowService.ListRuns
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
