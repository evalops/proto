    workflows.v1.HandleTriggerRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        triggerType:
          title: trigger_type
          description: |-
            trigger_type selects how the request is matched against WorkflowTrigger.
             Supported values are EVENT, WEBHOOK, and SCHEDULE.
          $ref: '#/components/schemas/workflows.v1.TriggerType'
        triggerEventId:
          type: string
          title: trigger_event_id
          description: |-
            trigger_event_id references the events/v1 CloudEvent.id that initiated
             this trigger when trigger_type is EVENT or WEBHOOK.
        eventType:
          type: string
          title: event_type
          description: |-
            For EVENT and optional WAIT_FOR_EVENT satisfaction: the
             events/v1 CloudEvent.type value.
        eventSubject:
          type: string
          title: event_subject
          description: |-
            For EVENT and optional WAIT_FOR_EVENT satisfaction: the
             events/v1 CloudEvent.subject value.
        tapProvider:
          type: string
          title: tap_provider
          description: 'For WEBHOOK: the tap/v1 TapEventData.provider to match.'
        tapEntityType:
          type: string
          title: tap_entity_type
          description: 'For WEBHOOK: the tap/v1 TapEventData.entity_type to match.'
        tapAction:
          type: string
          title: tap_action
          description: 'For WEBHOOK: the tap/v1 TapEventData.action to match.'
        cronExpr:
          type: string
          title: cron_expr
          description: 'For SCHEDULE: the cron expression that fired.'
        initiatorAgentId:
          type: string
          title: initiator_agent_id
        initiatorUserId:
          type: string
          title: initiator_user_id
        entityId:
          type: string
          title: entity_id
        entityType:
          type: string
          title: entity_type
        inputPayload:
          title: input_payload
          description: |-
            input_payload is passed to newly started runs and, when event metadata
             is present, to WAIT_FOR_EVENT steps completed by this trigger.
          $ref: '#/components/schemas/google.protobuf.Struct'
      title: HandleTriggerRequest
      additionalProperties: false
    workflows.v1.HandleTriggerResponse:
      type: object
      properties:
        startedRuns:
          type: array
          items:
            $ref: '#/components/schemas/workflows.v1.WorkflowRun'
          title: started_runs
          description: started_runs contains runs created by matching workflow triggers.
        updatedRuns:
          type: array
          items:
            $ref: '#/components/schemas/workflows.v1.WorkflowRun'
          title: updated_runs
          description: |-
            updated_runs contains existing runs advanced by satisfying
             WAIT_FOR_EVENT steps. Runs already present in started_runs should not
             be repeated here.
      title: HandleTriggerResponse
      additionalProperties: false
    workflows.v1.ListDefinitionsRequest:
