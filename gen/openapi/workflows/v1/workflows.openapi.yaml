            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.ListDefinitionsResponse'
  /workflows.v1.WorkflowService/PublishVersion:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: PublishVersion
      description: |-
        PublishVersion creates an immutable version snapshot of a definition.
         Runs always reference a specific definition version.
      operationId: workflows.v1.WorkflowService.PublishVersion
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
