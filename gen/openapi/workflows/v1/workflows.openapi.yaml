          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.StartRunResponse'
  /workflows.v1.WorkflowService/HandleTrigger:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: HandleTrigger
      description: |-
        HandleTrigger processes an asynchronous workflow trigger. It starts
         matching latest workflow versions for EVENT, WEBHOOK, or SCHEDULE
         triggers and may also satisfy WAIT_FOR_EVENT steps when event
         metadata is present.
      operationId: workflows.v1.WorkflowService.HandleTrigger
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
