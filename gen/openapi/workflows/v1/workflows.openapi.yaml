openapi: 3.1.0
info:
  title: workflows.v1
paths:
  /workflows.v1.WorkflowService/CreateDefinition:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: CreateDefinition
      description: CreateDefinition registers a new workflow definition.
      operationId: workflows.v1.WorkflowService.CreateDefinition
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflows.v1.CreateDefinitionRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.CreateDefinitionResponse'
  /workflows.v1.WorkflowService/GetDefinition:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: GetDefinition
      description: GetDefinition retrieves a workflow definition by ID.
      operationId: workflows.v1.WorkflowService.GetDefinition
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
