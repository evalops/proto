        RetryPolicy controls retry behavior for steps. Mirrors the pattern in
         objectives/v1 WakeSchedule (retry_count, max_retries, backoff_seconds).
    workflows.v1.StartRunRequest:
      type: object
      properties:
        definitionId:
          type: string
          title: definition_id
        definitionVersion:
          type: integer
          title: definition_version
          format: int32
        workspaceId:
          type: string
          title: workspace_id
        initiatorAgentId:
          type: string
          title: initiator_agent_id
        initiatorUserId:
          type: string
          title: initiator_user_id
        entityId:
          type: string
          title: entity_id
        entityType:
          type: string
          title: entity_type
        parentRunId:
          type: string
          title: parent_run_id
        inputPayload:
          title: input_payload
          $ref: '#/components/schemas/google.protobuf.Struct'
        triggerType:
          title: trigger_type
          description: |-
            trigger_type allows callers to start non-manual runs explicitly.
             When omitted, services may infer WORKFLOW from parent_run_id or
             default to MANUAL.
          $ref: '#/components/schemas/workflows.v1.TriggerType'
        triggerEventId:
          type: string
          title: trigger_event_id
          description: |-
            trigger_event_id references the events/v1 CloudEvent.id that started
             this run when trigger_type is EVENT or WEBHOOK.
      title: StartRunRequest
      additionalProperties: false
    workflows.v1.StartRunResponse:
      type: object
      properties:
        run:
          title: run
          $ref: '#/components/schemas/workflows.v1.WorkflowRun'
      title: StartRunResponse
      additionalProperties: false
    workflows.v1.StepDefinition:
      type: object
      properties:
        id:
          type: string
          title: id
          description: |-
            Unique identifier within the workflow (e.g., "prospect", "qualify",
             "send-outreach"). Referenced by Edge.from_step_id / Edge.to_step_id
             and by StepRun.step_id.
        name:
          type: string
          title: name
        stepType:
          title: step_type
          $ref: '#/components/schemas/workflows.v1.StepType'
        agentId:
          type: string
          title: agent_id
          description: |-
            For AGENT_ACTION: the agents/v1 Agent.id to assign, or empty for
             capability-based routing.
        requiredCapability:
          type: string
          title: required_capability
          description: |-
            For AGENT_ACTION: the agents/v1 capability required. Used when
             agent_id is empty to resolve the best available agent through the
             registry.
        actionType:
          type: string
          title: action_type
          description: |-
            For AGENT_ACTION: the action type passed to governance/v1
             EvaluateActionRequest.action_type and approvals/v1
             RequestApprovalRequest.action_type.
        riskLevel:
          type: string
          title: risk_level
          description: |-
            For APPROVAL_GATE: the approvals/v1 RiskLevel for this gate.
             Stored as string to avoid cross-package import (e.g., "RISK_LEVEL_HIGH").
        eventTypePattern:
          type: string
          title: event_type_pattern
          description: 'For WAIT_FOR_EVENT: the events/v1 CloudEvent.type pattern to match.'
        eventSubjectPattern:
          type: string
          title: event_subject_pattern
          description: 'For WAIT_FOR_EVENT: the events/v1 CloudEvent.subject pattern to match.'
        notificationChannel:
          type: string
          title: notification_channel
          description: |-
            For NOTIFICATION: the notifications/v1 DeliveryChannel to use.
             Stored as string (e.g., "DELIVERY_CHANNEL_SLACK").
        notificationTemplate:
          type: string
          title: notification_template
          description: 'For NOTIFICATION: the notification template.'
        conditionExpr:
          type: string
          title: condition_expr
          description: |-
            For BRANCH: the expression evaluated to select outgoing edges.
             References step output fields from prior steps.
        compensationStepId:
          type: string
          title: compensation_step_id
          description: |-
            The step to execute if this step fails and the workflow enters
             COMPENSATING state. References another StepDefinition.id in the
             same workflow.
        config:
          title: config
          description: |-
            Step-specific parameters. For AGENT_ACTION, passed as the objective
             description or context. For WAIT_FOR_EVENT, may contain
             timeout_seconds. For HUMAN_TASK, contains instructions.
          $ref: '#/components/schemas/google.protobuf.Struct'
        retryPolicy:
          title: retry_policy
          description: Per-step retry policy. Falls back to WorkflowVersion.default_retry_policy.
          $ref: '#/components/schemas/workflows.v1.RetryPolicy'
        timeoutSeconds:
          type: integer
          title: timeout_seconds
          format: int32
          description: Per-step timeout. Falls back to WorkflowVersion.timeout_seconds.
        promptName:
          type: string
          title: prompt_name
          description: |-
            prompt_name references prompts/v1 Prompt.name for agent action steps.
             Resolved through prompts/v1 Resolve at execution time using the
             label from the agent's agents/v1 AgentConfig.prompt_bindings.
        skillId:
          type: string
          title: skill_id
          description: skill_id references skills/v1 Skill.id required for this step.
      title: StepDefinition
      additionalProperties: false
      description: StepDefinition is a single node in the workflow DAG.
    workflows.v1.StepRun:
      type: object
      properties:
        stepId:
          type: string
          title: step_id
          description: step_id references StepDefinition.id from the workflow version.
        stepName:
          type: string
          title: step_name
        stepType:
          title: step_type
          $ref: '#/components/schemas/workflows.v1.StepType'
        state:
          title: state
          $ref: '#/components/schemas/workflows.v1.StepRunState'
        objectiveId:
          type: string
          title: objective_id
          description: |-
            objective_id links to objectives/v1 Objective.id — the objective
             created when this AGENT_ACTION step begins execution.
        agentId:
          type: string
          title: agent_id
          description: agent_id links to agents/v1 Agent.id — the agent assigned to this step.
        delegationId:
          type: string
          title: delegation_id
          description: |-
            delegation_id links to agents/v1 DelegationRecord.id when the step
             was fulfilled through capability-based delegation.
        approvalRequestId:
          type: string
          title: approval_request_id
          description: |-
            approval_request_id links to approvals/v1 ApprovalRequest.id for
             APPROVAL_GATE steps or when governance/v1 returns REQUIRE_APPROVAL.
        governanceDecision:
          type: string
          title: governance_decision
          description: |-
            governance_decision stores the governance/v1 ActionDecision result.
             Stored as string (e.g., "ACTION_DECISION_ALLOW").
        eventId:
          type: string
          title: event_id
          description: |-
            event_id references the events/v1 CloudEvent.id that satisfied a
             WAIT_FOR_EVENT step.
        notificationId:
          type: string
          title: notification_id
          description: |-
            notification_id references notifications/v1 Notification.id for
             NOTIFICATION steps.
        inputPayload:
          title: input_payload
          description: input_payload is the data this step received from upstream steps.
          $ref: '#/components/schemas/google.protobuf.Struct'
        outputPayload:
          title: output_payload
          description: output_payload is the data this step produced for downstream steps.
          $ref: '#/components/schemas/google.protobuf.Struct'
        errorMessage:
          type: string
          title: error_message
        retryCount:
          type: integer
          title: retry_count
          format: int32
        costUsd:
          type: number
          title: cost_usd
          format: double
          description: cost_usd is the meter/v1 cost attributed to this step's execution.
        startedAt:
          title: started_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        completedAt:
          title: completed_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: StepRun
      additionalProperties: false
      description: StepRun is the execution record for a single step within a workflow run.
    workflows.v1.TransitionStepRequest:
      type: object
      properties:
        runId:
          type: string
          title: run_id
        stepId:
          type: string
          title: step_id
        state:
          title: state
          $ref: '#/components/schemas/workflows.v1.StepRunState'
        objectiveId:
          type: string
          title: objective_id
        agentId:
          type: string
          title: agent_id
        delegationId:
          type: string
          title: delegation_id
        approvalRequestId:
          type: string
          title: approval_request_id
        governanceDecision:
          type: string
          title: governance_decision
        eventId:
          type: string
          title: event_id
        notificationId:
          type: string
          title: notification_id
        outputPayload:
          title: output_payload
          $ref: '#/components/schemas/google.protobuf.Struct'
        errorMessage:
          type: string
          title: error_message
        costUsd:
          type: number
          title: cost_usd
          format: double
      title: TransitionStepRequest
      additionalProperties: false
    workflows.v1.TransitionStepResponse:
      type: object
      properties:
        step:
          title: step
          $ref: '#/components/schemas/workflows.v1.StepRun'
        run:
          title: run
          $ref: '#/components/schemas/workflows.v1.WorkflowRun'
      title: TransitionStepResponse
      additionalProperties: false
    workflows.v1.WorkflowDefinition:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        name:
          type: string
          title: name
        description:
          type: string
          title: description
        latestVersion:
          type: integer
          title: latest_version
          format: int32
        tags:
          type: array
          items:
            type: string
          title: tags
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: WorkflowDefinition
      additionalProperties: false
      description: WorkflowDefinition is a named, versioned process template.
    workflows.v1.WorkflowRun:
      type: object
      properties:
        id:
          type: string
          title: id
        definitionId:
          type: string
          title: definition_id
        definitionVersion:
          type: integer
          title: definition_version
          format: int32
        workspaceId:
          type: string
          title: workspace_id
        state:
          title: state
          $ref: '#/components/schemas/workflows.v1.WorkflowState'
        steps:
          type: array
          items:
            $ref: '#/components/schemas/workflows.v1.StepRun'
          title: steps
        triggerEventId:
          type: string
          title: trigger_event_id
          description: |-
            trigger_event_id references the events/v1 CloudEvent.id that started
             this run, if trigger_type is EVENT or WEBHOOK.
        triggerType:
          title: trigger_type
          $ref: '#/components/schemas/workflows.v1.TriggerType'
        initiatorAgentId:
          type: string
          title: initiator_agent_id
          description: |-
            initiator_agent_id references agents/v1 Agent.id if an agent started
             this run. For MANUAL triggers, this may be empty (human-initiated).
        initiatorUserId:
          type: string
          title: initiator_user_id
          description: |-
            initiator_user_id references identity/v1 Member.user_id if a human
             started this run.
        parentRunId:
          type: string
          title: parent_run_id
          description: |-
            parent_run_id references another WorkflowRun.id when this run is a
             sub-workflow started by a WORKFLOW trigger.
        entityId:
          type: string
          title: entity_id
          description: |-
            entity_id references entities/v1 CanonicalEntity.id — the primary
             entity this workflow operates on (e.g., a contact being prospected,
             a deal being closed).
        entityType:
          type: string
          title: entity_type
          description: |-
            entity_type aligns with entities/v1 EntityType. Stored as string
             to avoid cross-package import (e.g., "ENTITY_TYPE_DEAL").
        inputPayload:
          title: input_payload
          description: input_payload is the trigger data passed to the first step.
          $ref: '#/components/schemas/google.protobuf.Struct'
        outputPayload:
          title: output_payload
          description: output_payload is the final result produced by the terminal step.
          $ref: '#/components/schemas/google.protobuf.Struct'
        totalCostUsd:
          type: number
          title: total_cost_usd
          format: double
          description: |-
            total_cost_usd is the sum of meter/v1 usage records attributed to
             this workflow run's steps.
        startedAt:
          title: started_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        completedAt:
          title: completed_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: WorkflowRun
      additionalProperties: false
      description: WorkflowRun is a live execution of a workflow definition version.
    workflows.v1.WorkflowRunLifecycleEvent:
      type: object
      properties:
        run:
          title: run
          $ref: '#/components/schemas/workflows.v1.WorkflowRun'
        operation:
          type: string
          title: operation
        recordedAt:
          title: recorded_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: WorkflowRunLifecycleEvent
      additionalProperties: false
      description: |-
        WorkflowRunLifecycleEvent is the typed payload for workflow run lifecycle
         events published on the internal event bus (for example
         `workflows.changes.run.started` and `workflows.changes.run.completed`).
    workflows.v1.WorkflowStepLifecycleEvent:
      type: object
      properties:
        runId:
          type: string
          title: run_id
        definitionId:
          type: string
          title: definition_id
        definitionVersion:
          type: integer
          title: definition_version
          format: int32
        workspaceId:
          type: string
          title: workspace_id
        workflowState:
          title: workflow_state
          $ref: '#/components/schemas/workflows.v1.WorkflowState'
        triggerType:
          title: trigger_type
          $ref: '#/components/schemas/workflows.v1.TriggerType'
        triggerEventId:
          type: string
          title: trigger_event_id
        initiatorAgentId:
          type: string
          title: initiator_agent_id
        initiatorUserId:
          type: string
          title: initiator_user_id
        parentRunId:
          type: string
          title: parent_run_id
        entityId:
          type: string
          title: entity_id
        entityType:
          type: string
          title: entity_type
        workflowTotalCostUsd:
          type: number
          title: workflow_total_cost_usd
          format: double
        step:
          title: step
          $ref: '#/components/schemas/workflows.v1.StepRun'
        operation:
          type: string
          title: operation
        recordedAt:
          title: recorded_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: WorkflowStepLifecycleEvent
      additionalProperties: false
      description: |-
        WorkflowStepLifecycleEvent is the typed payload for workflow step lifecycle
         events published on the internal event bus (for example
         `workflows.changes.step.started`, `workflows.changes.step.waiting`, and
         `workflows.changes.step.completed`). It carries the specific StepRun plus the
         run context consumers need without requiring the full WorkflowRun snapshot.
    workflows.v1.WorkflowTrigger:
      type: object
      properties:
        triggerType:
          title: trigger_type
          $ref: '#/components/schemas/workflows.v1.TriggerType'
        eventType:
          type: string
          title: event_type
          description: 'For EVENT: the events/v1 CloudEvent.type to match.'
        eventSubject:
          type: string
          title: event_subject
          description: 'For EVENT: the events/v1 CloudEvent.subject to match.'
        tapProvider:
          type: string
          title: tap_provider
          description: 'For WEBHOOK: the tap/v1 TapEventData.provider to match.'
        tapEntityType:
          type: string
          title: tap_entity_type
          description: 'For WEBHOOK: the tap/v1 TapEventData.entity_type to match.'
        tapAction:
          type: string
          title: tap_action
          description: 'For WEBHOOK: the tap/v1 TapEventData.action to match.'
        cronExpr:
          type: string
          title: cron_expr
          description: 'For SCHEDULE: the cron expression.'
        parentWorkflowId:
          type: string
          title: parent_workflow_id
          description: 'For WORKFLOW: the parent workflows/v1 WorkflowDefinition.id.'
        filterExpr:
          type: string
          title: filter_expr
          description: |-
            Filter expression applied to the trigger payload. Only events matching
             this expression start a run.
      title: WorkflowTrigger
      additionalProperties: false
      description: WorkflowTrigger defines what automatically starts a workflow run.
    workflows.v1.WorkflowVersion:
      type: object
      properties:
        id:
          type: string
          title: id
        definitionId:
          type: string
          title: definition_id
        version:
          type: integer
          title: version
          format: int32
        steps:
          type: array
          items:
            $ref: '#/components/schemas/workflows.v1.StepDefinition'
          title: steps
        edges:
          type: array
          items:
            $ref: '#/components/schemas/workflows.v1.Edge'
          title: edges
        trigger:
          title: trigger
          $ref: '#/components/schemas/workflows.v1.WorkflowTrigger'
        defaultRetryPolicy:
          title: default_retry_policy
          $ref: '#/components/schemas/workflows.v1.RetryPolicy'
        timeoutSeconds:
          type: integer
          title: timeout_seconds
          format: int32
        author:
          type: string
          title: author
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: WorkflowVersion
      additionalProperties: false
      description: |-
        WorkflowVersion is an immutable snapshot of a workflow's step graph.
         Follows the same versioning pattern as prompts/v1 Version and
         skills/v1 SkillVersion.
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
        debug:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
security: []
tags:
  - name: workflows.v1.WorkflowService
    description: |-
      WorkflowService manages multi-agent process definitions and their
       executions. A workflow composes multiple objectives/v1 Objective records
       into a DAG with typed step semantics, approval gates, governance checks,
       event waits, branching, and compensation.

       Where objectives/v1 tracks a single agent doing a single thing, a workflow
       tracks the process: prospect -> qualify -> outreach -> follow-up -> close.
       Each step in a running workflow creates an objective, delegates to an agent
       (agents/v1), and feeds its output to the next step.
