          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.ListRunsResponse'
  /workflows.v1.WorkflowService/TransitionStep:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: TransitionStep
      description: |-
        TransitionStep records a step state change. Called by the orchestrator
         as agents complete objectives, approvals resolve, or events arrive.
      operationId: workflows.v1.WorkflowService.TransitionStep
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflows.v1.TransitionStepRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.TransitionStepResponse'
  /workflows.v1.WorkflowService/PauseRun:
    post:
      tags:
        - workflows.v1.WorkflowService
      summary: PauseRun
      description: |-
        PauseRun suspends a running workflow. Steps in RUNNING state continue
         to completion but no new steps are started.
      operationId: workflows.v1.WorkflowService.PauseRun
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflows.v1.PauseRunRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/workflows.v1.PauseRunResponse'
