components:
  schemas:
    entities.v1.EntityType:
      type: string
      title: EntityType
      enum:
        - ENTITY_TYPE_UNSPECIFIED
        - ENTITY_TYPE_CONTACT
        - ENTITY_TYPE_COMPANY
        - ENTITY_TYPE_DEAL
        - ENTITY_TYPE_TICKET
        - ENTITY_TYPE_CUSTOMER
        - ENTITY_TYPE_OPPORTUNITY
      description: EntityType identifies the kind of entity across systems.
    entities.v1.MatchMethod:
      type: string
      title: MatchMethod
      enum:
        - MATCH_METHOD_UNSPECIFIED
        - MATCH_METHOD_EMAIL
        - MATCH_METHOD_DOMAIN
        - MATCH_METHOD_COMPANY_NAME
        - MATCH_METHOD_RECORD_NAME
        - MATCH_METHOD_MANUAL
      description: MatchMethod describes how two entities were correlated.
    entities.v1.CanonicalEntity:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        primaryType:
          title: primary_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        primaryName:
          type: string
          title: primary_name
        refs:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CrossSystemRef'
          title: refs
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: CanonicalEntity
      additionalProperties: false
      description: CanonicalEntity is the unified, deduplicated entity record.
    entities.v1.CorrelateRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        emails:
          type: array
          items:
            type: string
          title: emails
        domains:
          type: array
          items:
            type: string
          title: domains
        companyName:
          type: string
          title: company_name
        recordName:
          type: string
          title: record_name
      title: CorrelateRequest
      additionalProperties: false
    entities.v1.CorrelateResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CorrelationGroup'
          title: groups
      title: CorrelateResponse
      additionalProperties: false
    entities.v1.CorrelationGroup:
      type: object
      properties:
        id:
          type: string
          title: id
        primaryName:
          type: string
          title: primary_name
        primaryType:
          title: primary_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        entities:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CanonicalEntity'
          title: entities
        matches:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CorrelationMatch'
          title: matches
      title: CorrelationGroup
      additionalProperties: false
      description: CorrelationGroup is a cluster of correlated entities.
    entities.v1.CorrelationMatch:
      type: object
      properties:
        matchedBy:
          title: matched_by
          $ref: '#/components/schemas/entities.v1.MatchMethod'
        matchedValue:
          type: string
          title: matched_value
        confidence:
          type: number
          title: confidence
          format: float
      title: CorrelationMatch
      additionalProperties: false
      description: CorrelationMatch describes a single match between entities.
    entities.v1.CrossSystemRef:
      type: object
      properties:
        integrationId:
          type: string
          title: integration_id
        recordId:
          type: string
          title: record_id
        entityType:
          title: entity_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        displayName:
          type: string
          title: display_name
        emails:
          type: array
          items:
            type: string
          title: emails
        domains:
          type: array
          items:
            type: string
          title: domains
        confidence:
          type: number
          title: confidence
          format: float
      title: CrossSystemRef
      additionalProperties: false
      description: CrossSystemRef links a canonical entity to a record in an external system.
    entities.v1.CrossSystemRefKey:
      type: object
      properties:
        integrationId:
          type: string
          title: integration_id
        recordId:
          type: string
          title: record_id
      title: CrossSystemRefKey
      additionalProperties: false
    entities.v1.GetCanonicalRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: GetCanonicalRequest
      additionalProperties: false
    entities.v1.GetCanonicalResponse:
      type: object
      properties:
        entity:
          title: entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
      title: GetCanonicalResponse
      additionalProperties: false
    entities.v1.GetCorrelationGraphRequest:
      type: object
      properties:
        canonicalEntityId:
          type: string
          title: canonical_entity_id
        depth:
          type: integer
          title: depth
          format: int32
      title: GetCorrelationGraphRequest
      additionalProperties: false
    entities.v1.GetCorrelationGraphResponse:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CorrelationGroup'
          title: groups
      title: GetCorrelationGraphResponse
      additionalProperties: false
    entities.v1.IngestResultRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        integrationId:
          type: string
          title: integration_id
        recordId:
          type: string
          title: record_id
        entityType:
          title: entity_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        displayName:
          type: string
          title: display_name
        emails:
          type: array
          items:
            type: string
          title: emails
        domains:
          type: array
          items:
            type: string
          title: domains
      title: IngestResultRequest
      additionalProperties: false
    entities.v1.IngestResultResponse:
      type: object
      properties:
        entity:
          title: entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
        created:
          type: boolean
          title: created
      title: IngestResultResponse
      additionalProperties: false
    entities.v1.LinkEntityRequest:
      type: object
      properties:
        canonicalEntityId:
          type: string
          title: canonical_entity_id
        ref:
          title: ref
          $ref: '#/components/schemas/entities.v1.CrossSystemRef'
      title: LinkEntityRequest
      additionalProperties: false
    entities.v1.LinkEntityResponse:
      type: object
      properties:
        entity:
          title: entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
      title: LinkEntityResponse
      additionalProperties: false
    entities.v1.MergeEntitiesRequest:
      type: object
      properties:
        targetCanonicalEntityId:
          type: string
          title: target_canonical_entity_id
        sourceCanonicalEntityIds:
          type: array
          items:
            type: string
          title: source_canonical_entity_ids
        primaryType:
          title: primary_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        primaryName:
          type: string
          title: primary_name
      title: MergeEntitiesRequest
      additionalProperties: false
    entities.v1.MergeEntitiesResponse:
      type: object
      properties:
        entity:
          title: entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
        mergedEntities:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CanonicalEntity'
          title: merged_entities
      title: MergeEntitiesResponse
      additionalProperties: false
    entities.v1.ResolveRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        integrationId:
          type: string
          title: integration_id
        recordId:
          type: string
          title: record_id
      title: ResolveRequest
      additionalProperties: false
    entities.v1.ResolveResponse:
      type: object
      properties:
        entity:
          title: entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
      title: ResolveResponse
      additionalProperties: false
    entities.v1.SearchRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        query:
          type: string
          title: query
        entityType:
          title: entity_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        limit:
          type: integer
          title: limit
          format: int32
        offset:
          type: integer
          title: offset
          format: int32
      title: SearchRequest
      additionalProperties: false
    entities.v1.SearchResponse:
      type: object
      properties:
        entities:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CanonicalEntity'
          title: entities
        total:
          type: integer
          title: total
          format: int32
      title: SearchResponse
      additionalProperties: false
    entities.v1.SplitEntityRequest:
      type: object
      properties:
        canonicalEntityId:
          type: string
          title: canonical_entity_id
        refs:
          type: array
          items:
            $ref: '#/components/schemas/entities.v1.CrossSystemRefKey'
          title: refs
        newPrimaryType:
          title: new_primary_type
          $ref: '#/components/schemas/entities.v1.EntityType'
        newPrimaryName:
          type: string
          title: new_primary_name
      title: SplitEntityRequest
      additionalProperties: false
    entities.v1.SplitEntityResponse:
      type: object
      properties:
        sourceEntity:
          title: source_entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
        splitEntity:
          title: split_entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
      title: SplitEntityResponse
      additionalProperties: false
    entities.v1.UnlinkEntityRequest:
      type: object
      properties:
        canonicalEntityId:
          type: string
          title: canonical_entity_id
        integrationId:
          type: string
          title: integration_id
        recordId:
          type: string
          title: record_id
      title: UnlinkEntityRequest
      additionalProperties: false
    entities.v1.UnlinkEntityResponse:
      type: object
      properties:
        entity:
          title: entity
          $ref: '#/components/schemas/entities.v1.CanonicalEntity'
      title: UnlinkEntityResponse
      additionalProperties: false
    google.protobuf.Timestamp:
      type: string
      examples:
        - 1s
        - 1.000340012s
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
