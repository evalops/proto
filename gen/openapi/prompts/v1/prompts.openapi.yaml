        variables:
          type: array
          items:
            type: string
          title: variables
      title: CreateVersionRequest
      additionalProperties: false
    prompts.v1.Deployment:
      type: object
      properties:
        id:
          type: string
          title: id
        promptId:
          type: string
          title: prompt_id
        versionId:
          type: string
          title: version_id
        version:
          type: integer
          title: version
          format: int32
        surface:
          type: string
          title: surface
          description: label name (kept as "surface" for wire compat)
        env:
          type: string
          title: env
          description: deprecated — use label name
        actor:
          type: string
          title: actor
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        rollbackFrom:
          type: integer
          title: rollback_from
          format: int32
      title: Deployment
      additionalProperties: false
      description: |-
        Deployment is an audit record of a label assignment. Retained for compliance.
         Every AssignLabel call produces both a Label update and a Deployment record.
    prompts.v1.EvalLink:
      type: object
      properties:
        id:
          type: string
          title: id
        promptId:
          type: string
          title: prompt_id
        versionId:
          type: string
          title: version_id
        evalRunId:
          type: string
          title: eval_run_id
        score:
          type: number
          title: score
          format: double
        pass:
          type: boolean
          title: pass
        evalUrl:
          type: string
          title: eval_url
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: EvalLink
      additionalProperties: false
      description: EvalLink connects a prompt version to a Fermata evaluation result.
    prompts.v1.GetPromptRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: GetPromptRequest
      additionalProperties: false
    prompts.v1.Label:
      type: object
      properties:
        promptId:
          type: string
          title: prompt_id
        name:
          type: string
          title: name
          description: '"production", "staging", "canary"'
        version:
          type: integer
          title: version
          format: int32
        actor:
          type: string
          title: actor
        rollbackFrom:
          type: integer
          title: rollback_from
          format: int32
          description: set when this assignment is a rollback
        assignedAt:
          title: assigned_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Label
      additionalProperties: false
      description: |-
        Label is a mutable pointer from (org, prompt, label_name) to a version.
         The primary resolution mechanism — code references labels, not version numbers.
         Promotion and rollback are both label reassignments.
