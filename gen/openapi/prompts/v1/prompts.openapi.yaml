          title: label
          description: 'default: "production"'
      title: ResolveAllRequest
      additionalProperties: false
      description: ResolveAllRequest returns all active prompts for a label — gateway startup path.
    prompts.v1.ResolveAllResponse:
      type: object
      properties:
        prompts:
          type: array
          items:
            $ref: '#/components/schemas/prompts.v1.ResolvedPrompt'
          title: prompts
      title: ResolveAllResponse
      additionalProperties: false
    prompts.v1.ResolveRequest:
      type: object
      properties:
        name:
          type: string
          title: name
        label:
          type: string
          title: label
          description: 'default: "production"'
      title: ResolveRequest
      additionalProperties: false
      description: |-
        ResolveRequest is the hot-path lookup. Label defaults to "production".
         Consumers MUST pin the resolved version at session/sequence start.
    prompts.v1.ResolveResponse:
      type: object
      properties:
        version:
          title: version
          $ref: '#/components/schemas/prompts.v1.Version'
      title: ResolveResponse
      additionalProperties: false
    prompts.v1.ResolvedPrompt:
      type: object
      properties:
        promptName:
          type: string
          title: prompt_name
        promptId:
          type: string
          title: prompt_id
        label:
          type: string
          title: label
        version:
          title: version
          $ref: '#/components/schemas/prompts.v1.Version'
      title: ResolvedPrompt
      additionalProperties: false
      description: ResolvedPrompt is returned by the bulk-load endpoint for gateway startup.
    prompts.v1.Version:
      type: object
      properties:
        id:
          type: string
          title: id
        promptId:
          type: string
          title: prompt_id
        version:
          type: integer
          title: version
          format: int32
        content:
          type: string
          title: content
        model:
          type: string
          title: model
        hash:
          type: string
          title: hash
        author:
          type: string
          title: author
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        variables:
          type: array
          items:
            type: string
          title: variables
          description: |-
            Expected interpolation variable names (e.g., "customer_name", "deal_stage").
             Declaration only — rendering is the consumer's responsibility.
        tokenCounts:
          type: object
          title: token_counts
          additionalProperties:
            type:
              - integer
              - string
            title: value
            format: int64
          description: |-
            Per-model token counts for context window budgeting.
             Populated lazily by gateway or fermata after first tokenization.
      title: Version
      additionalProperties: false
      description: Version is an immutable snapshot of prompt content.
    prompts.v1.Version.TokenCountsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type:
            - integer
            - string
          title: value
          format: int64
      title: TokenCountsEntry
      additionalProperties: false
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
        debug:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
