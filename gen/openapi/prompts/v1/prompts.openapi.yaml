      properties:
        id:
          type: string
          title: id
        organizationId:
          type: string
          title: organization_id
        name:
          type: string
          title: name
        surface:
          type: string
          title: surface
        tags:
          type: array
          items:
            type: string
          title: tags
        metadata:
          title: metadata
          $ref: '#/components/schemas/google.protobuf.Struct'
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Prompt
      additionalProperties: false
      description: |-
        Prompt is a named, versioned prompt template scoped to an organization.
         Used by all surfaces (Maestro, Ensemble, Aria) and by Fermata for eval
         linkage. The canonical cross-service contract for prompt governance.
    prompts.v1.ResolveAllRequest:
