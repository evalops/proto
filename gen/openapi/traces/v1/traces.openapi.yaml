          type: integer
          title: ingested_count
          format: int32
        traces:
          type: array
          items:
            $ref: '#/components/schemas/traces.v1.TraceSummary'
          title: traces
      title: IngestSpansResponse
      additionalProperties: false
    traces.v1.ListTracesRequest:
      type: object
