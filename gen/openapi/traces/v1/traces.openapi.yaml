          title: traces
        total:
          type: integer
          title: total
          format: int32
        hasMore:
          type: boolean
          title: has_more
      title: ListTracesResponse
      additionalProperties: false
    traces.v1.Span:
      type: object
      properties:
        traceId:
          type: string
          title: trace_id
        spanId:
          type: string
          title: span_id
        parentSpanId:
          type: string
          title: parent_span_id
        workspaceId:
          type: string
          title: workspace_id
        organizationId:
          type: string
          title: organization_id
        agentId:
          type: string
          title: agent_id
        surface:
          type: string
          title: surface
        name:
          type: string
          title: name
        kind:
          type: string
          title: kind
        model:
          type: string
          title: model
        provider:
          type: string
          title: provider
        tokenInput:
          type:
            - integer
            - string
          title: token_input
          format: int64
        tokenOutput:
          type:
            - integer
            - string
          title: token_output
          format: int64
        latencyMs:
          type:
            - integer
            - string
          title: latency_ms
          format: int64
        status:
