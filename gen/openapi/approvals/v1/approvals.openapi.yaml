components:
  schemas:
    approvals.v1.ActionAuthority:
      type: string
      title: ActionAuthority
      enum:
        - ACTION_AUTHORITY_UNSPECIFIED
        - ACTION_AUTHORITY_OWN
        - ACTION_AUTHORITY_RECOMMEND
        - ACTION_AUTHORITY_REQUIRE_APPROVAL
      description: ActionAuthority describes the authority level for an action.
    approvals.v1.DecisionType:
      type: string
      title: DecisionType
      enum:
        - DECISION_TYPE_UNSPECIFIED
        - DECISION_TYPE_APPROVED
        - DECISION_TYPE_DENIED
        - DECISION_TYPE_ESCALATED
        - DECISION_TYPE_EXPIRED
        - DECISION_TYPE_AUTO_APPROVED
      description: DecisionType describes the outcome of an approval request.
    approvals.v1.RiskLevel:
      type: string
      title: RiskLevel
      enum:
        - RISK_LEVEL_UNSPECIFIED
        - RISK_LEVEL_LOW
        - RISK_LEVEL_MEDIUM
        - RISK_LEVEL_HIGH
        - RISK_LEVEL_CRITICAL
      description: RiskLevel classifies the risk of an action.
    approvals.v1.ApprovalDecision:
      type: object
      properties:
        id:
          type: string
          title: id
        approvalRequestId:
          type: string
          title: approval_request_id
        decision:
          title: decision
          $ref: '#/components/schemas/approvals.v1.DecisionType'
        decidedBy:
          type: string
          title: decided_by
        reason:
          type: string
          title: reason
        decidedAt:
          title: decided_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: ApprovalDecision
      additionalProperties: false
      description: ApprovalDecision records a decision made on an approval request.
    approvals.v1.ApprovalHabit:
      type: object
      properties:
        pattern:
          type: string
          title: pattern
        autoApproveConfidence:
          type: number
          title: auto_approve_confidence
          format: float
        observationCount:
          type: integer
          title: observation_count
          format: int32
        approvedCount:
          type: integer
          title: approved_count
          format: int32
      title: ApprovalHabit
      additionalProperties: false
      description: ApprovalHabit captures learned patterns for auto-approval.
    approvals.v1.ApprovalPolicy:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        rules:
          type: array
          items:
            $ref: '#/components/schemas/approvals.v1.ApprovalRule'
          title: rules
        autoApproveConfig:
          title: auto_approve_config
          $ref: '#/components/schemas/approvals.v1.AutoApproveConfig'
      title: ApprovalPolicy
      additionalProperties: false
      description: ApprovalPolicy defines the set of rules for a workspace.
    approvals.v1.ApprovalRequest:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        approverUserId:
          type: string
          title: approver_user_id
        agentId:
          type: string
          title: agent_id
        surface:
          type: string
          title: surface
        actionType:
          type: string
          title: action_type
        actionPayload:
          type: string
          title: action_payload
          format: byte
        riskLevel:
          title: risk_level
          $ref: '#/components/schemas/approvals.v1.RiskLevel'
        contextJson:
          type: string
          title: context_json
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: ApprovalRequest
      additionalProperties: false
      description: ApprovalRequest is the canonical approval request record.
    approvals.v1.ApprovalRule:
      type: object
      properties:
        id:
          type: string
          title: id
        actionType:
          type: string
          title: action_type
        minRiskLevel:
          title: min_risk_level
          $ref: '#/components/schemas/approvals.v1.RiskLevel'
        authority:
          title: authority
          $ref: '#/components/schemas/approvals.v1.ActionAuthority'
        description:
          type: string
          title: description
      title: ApprovalRule
      additionalProperties: false
      description: ApprovalRule defines a single rule within an approval policy.
    approvals.v1.AutoApproveConfig:
      type: object
      properties:
        enabled:
          type: boolean
          title: enabled
        threshold:
          type: number
          title: threshold
          format: float
          description: Minimum confidence score. Defaults to 0.95 when not set.
          nullable: true
        minObservations:
          type: integer
          title: min_observations
          format: int32
          description: Minimum decisions before activation. Defaults to 20 when not set.
          nullable: true
        excludedRiskLevels:
          type: array
          items:
            $ref: '#/components/schemas/approvals.v1.RiskLevel'
          title: excluded_risk_levels
          description: always require human
      title: AutoApproveConfig
      additionalProperties: false
      description: AutoApproveConfig controls automatic approval behavior for a workspace.
    approvals.v1.AutoApproveEvidence:
      type: object
      properties:
        pattern:
          type: string
          title: pattern
        confidence:
          type: number
          title: confidence
          format: float
        observationCount:
          type: integer
          title: observation_count
          format: int32
        thresholdApplied:
          type: number
          title: threshold_applied
          format: float
      title: AutoApproveEvidence
      additionalProperties: false
      description: AutoApproveEvidence captures the data behind an automatic approval decision.
    approvals.v1.EscalateRequest:
      type: object
      properties:
        approvalRequestId:
          type: string
          title: approval_request_id
        reason:
          type: string
          title: reason
      title: EscalateRequest
      additionalProperties: false
    approvals.v1.EscalateResponse:
      type: object
      properties:
        approvalRequest:
          title: approval_request
          $ref: '#/components/schemas/approvals.v1.ApprovalRequest'
      title: EscalateResponse
      additionalProperties: false
    approvals.v1.GetApprovalRequest:
      type: object
      properties:
        approvalRequestId:
          type: string
          title: approval_request_id
        workspaceId:
          type: string
          title: workspace_id
      title: GetApprovalRequest
      additionalProperties: false
    approvals.v1.GetApprovalResponse:
      type: object
      properties:
        approvalRequest:
          title: approval_request
          $ref: '#/components/schemas/approvals.v1.ApprovalRequest'
        decisions:
          type: array
          items:
            $ref: '#/components/schemas/approvals.v1.ApprovalDecision'
          title: decisions
        state:
          type: string
          title: state
      title: GetApprovalResponse
      additionalProperties: false
    approvals.v1.GetHabitsRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
      title: GetHabitsRequest
      additionalProperties: false
    approvals.v1.GetHabitsResponse:
      type: object
      properties:
        habits:
          type: array
          items:
            $ref: '#/components/schemas/approvals.v1.ApprovalHabit'
          title: habits
      title: GetHabitsResponse
      additionalProperties: false
    approvals.v1.GetPolicyRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
      title: GetPolicyRequest
      additionalProperties: false
    approvals.v1.GetPolicyResponse:
      type: object
      properties:
        policy:
          title: policy
          $ref: '#/components/schemas/approvals.v1.ApprovalPolicy'
      title: GetPolicyResponse
      additionalProperties: false
    approvals.v1.ListPendingRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        limit:
          type: integer
          title: limit
          format: int32
        offset:
          type: integer
          title: offset
          format: int32
      title: ListPendingRequest
      additionalProperties: false
    approvals.v1.ListPendingResponse:
      type: object
      properties:
        requests:
          type: array
          items:
            $ref: '#/components/schemas/approvals.v1.ApprovalRequest'
          title: requests
        total:
          type: integer
          title: total
          format: int32
      title: ListPendingResponse
      additionalProperties: false
    approvals.v1.RequestApprovalRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        approverUserId:
          type: string
          title: approver_user_id
        agentId:
          type: string
          title: agent_id
        surface:
          type: string
          title: surface
        actionType:
          type: string
          title: action_type
        actionPayload:
          type: string
          title: action_payload
          format: byte
        riskLevel:
          title: risk_level
          $ref: '#/components/schemas/approvals.v1.RiskLevel'
        contextJson:
          type: string
          title: context_json
      title: RequestApprovalRequest
      additionalProperties: false
    approvals.v1.RequestApprovalResponse:
      type: object
      properties:
        approvalRequest:
          title: approval_request
          $ref: '#/components/schemas/approvals.v1.ApprovalRequest'
        autoApproveEvidence:
          title: auto_approve_evidence
          $ref: '#/components/schemas/approvals.v1.AutoApproveEvidence'
      title: RequestApprovalResponse
      additionalProperties: false
    approvals.v1.ResolveApprovalRequest:
      type: object
      properties:
        approvalRequestId:
          type: string
          title: approval_request_id
        decision:
          title: decision
          $ref: '#/components/schemas/approvals.v1.DecisionType'
        decidedBy:
          type: string
          title: decided_by
        reason:
          type: string
          title: reason
      title: ResolveApprovalRequest
      additionalProperties: false
    approvals.v1.ResolveApprovalResponse:
      type: object
      properties:
        decision:
          title: decision
          $ref: '#/components/schemas/approvals.v1.ApprovalDecision'
      title: ResolveApprovalResponse
      additionalProperties: false
    approvals.v1.SetPolicyRequest:
      type: object
      properties:
        policy:
          title: policy
          $ref: '#/components/schemas/approvals.v1.ApprovalPolicy'
      title: SetPolicyRequest
      additionalProperties: false
    approvals.v1.SetPolicyResponse:
      type: object
      properties:
        policy:
          title: policy
          $ref: '#/components/schemas/approvals.v1.ApprovalPolicy'
      title: SetPolicyResponse
      additionalProperties: false
    google.protobuf.Timestamp:
      type: string
      examples:
        - 1s
        - 1.000340012s
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
        debug:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
security: []
tags:
  - name: approvals.v1.ApprovalService
    description: ApprovalService manages approval workflows for agent actions.
