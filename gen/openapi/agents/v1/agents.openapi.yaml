openapi: 3.1.0
info:
  title: agents.v1
paths:
  /agents.v1.AgentService/Register:
    post:
      tags:
        - agents.v1.AgentService
      summary: Register
      description: Register creates a new agent definition.
      operationId: agents.v1.AgentService.Register
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.RegisterRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.RegisterResponse'
  /agents.v1.AgentService/Get:
    post:
      tags:
        - agents.v1.AgentService
      summary: Get
      description: Get retrieves an agent by ID.
      operationId: agents.v1.AgentService.Get
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.GetRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.GetResponse'
  /agents.v1.AgentService/List:
    post:
      tags:
        - agents.v1.AgentService
      summary: List
      description: List returns agents matching the query filters.
      operationId: agents.v1.AgentService.List
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.ListRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.ListResponse'
  /agents.v1.AgentService/Update:
    post:
      tags:
        - agents.v1.AgentService
      summary: Update
      description: Update modifies mutable agent metadata (name, description, surfaces).
      operationId: agents.v1.AgentService.Update
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.UpdateRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.UpdateResponse'
  /agents.v1.AgentService/Deregister:
    post:
      tags:
        - agents.v1.AgentService
      summary: Deregister
      description: Deregister removes an agent from the registry.
      operationId: agents.v1.AgentService.Deregister
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.DeregisterRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.DeregisterResponse'
  /agents.v1.AgentService/PushConfig:
    post:
      tags:
        - agents.v1.AgentService
      summary: PushConfig
      description: |-
        PushConfig creates a new immutable configuration version for an agent.
         The agent's active_config_version advances atomically.
      operationId: agents.v1.AgentService.PushConfig
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.PushConfigRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.PushConfigResponse'
  /agents.v1.AgentService/GetConfig:
    post:
      tags:
        - agents.v1.AgentService
      summary: GetConfig
      description: GetConfig retrieves a specific configuration version.
      operationId: agents.v1.AgentService.GetConfig
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.GetConfigRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.GetConfigResponse'
  /agents.v1.AgentService/ListConfigs:
    post:
      tags:
        - agents.v1.AgentService
      summary: ListConfigs
      description: ListConfigs returns all configuration versions for an agent.
      operationId: agents.v1.AgentService.ListConfigs
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.ListConfigsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.ListConfigsResponse'
  /agents.v1.AgentService/RollbackConfig:
    post:
      tags:
        - agents.v1.AgentService
      summary: RollbackConfig
      description: RollbackConfig atomically reverts an agent to a prior configuration version.
      operationId: agents.v1.AgentService.RollbackConfig
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.RollbackConfigRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.RollbackConfigResponse'
  /agents.v1.AgentService/Delegate:
    post:
      tags:
        - agents.v1.AgentService
      summary: Delegate
      description: |-
        Delegate requests that another agent (or any agent with a matching
         capability) accept a unit of work. The delegation is tracked as a
         DelegationRecord and linked to the originating objective and optional
         workflow step.
      operationId: agents.v1.AgentService.Delegate
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.DelegateRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.DelegateResponse'
  /agents.v1.AgentService/ResolveDelegation:
    post:
      tags:
        - agents.v1.AgentService
      summary: ResolveDelegation
      description: ResolveDelegation records the outcome of a delegation.
      operationId: agents.v1.AgentService.ResolveDelegation
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.ResolveDelegationRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.ResolveDelegationResponse'
  /agents.v1.AgentService/GetDelegation:
    post:
      tags:
        - agents.v1.AgentService
      summary: GetDelegation
      description: GetDelegation retrieves a delegation record by ID.
      operationId: agents.v1.AgentService.GetDelegation
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.GetDelegationRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.GetDelegationResponse'
  /agents.v1.AgentService/ListDelegations:
    post:
      tags:
        - agents.v1.AgentService
      summary: ListDelegations
      description: ListDelegations returns delegations matching the query filters.
      operationId: agents.v1.AgentService.ListDelegations
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.ListDelegationsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.ListDelegationsResponse'
  /agents.v1.AgentService/Heartbeat:
    post:
      tags:
        - agents.v1.AgentService
      summary: Heartbeat
      description: |-
        Heartbeat records agent liveness. The registry uses this to maintain
         presence state and route capability-based delegation requests.
      operationId: agents.v1.AgentService.Heartbeat
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/agents.v1.HeartbeatRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/agents.v1.HeartbeatResponse'
components:
  schemas:
    agents.v1.AgentStatus:
      type: string
      title: AgentStatus
      enum:
        - AGENT_STATUS_UNSPECIFIED
        - AGENT_STATUS_ACTIVE
        - AGENT_STATUS_IDLE
        - AGENT_STATUS_BUSY
        - AGENT_STATUS_OFFLINE
        - AGENT_STATUS_DEGRADED
        - AGENT_STATUS_SUSPENDED
      description: AgentStatus describes the operational state of an agent.
    agents.v1.DelegationStatus:
      type: string
      title: DelegationStatus
      enum:
        - DELEGATION_STATUS_UNSPECIFIED
        - DELEGATION_STATUS_PENDING
        - DELEGATION_STATUS_ACCEPTED
        - DELEGATION_STATUS_REJECTED
        - DELEGATION_STATUS_COMPLETED
        - DELEGATION_STATUS_FAILED
        - DELEGATION_STATUS_TIMED_OUT
      description: DelegationStatus describes the lifecycle state of a delegation.
    google.protobuf.NullValue:
      type: string
      title: NullValue
      enum:
        - NULL_VALUE
      description: |-
        `NullValue` is a singleton enumeration to represent the null value for the
         `Value` type union.

         The JSON representation for `NullValue` is JSON `null`.
    agents.v1.Agent:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        name:
          type: string
          title: name
        description:
          type: string
          title: description
        agentType:
          type: string
          title: agent_type
          description: |-
            agent_type aligns with identity/v1 IntrospectResponse.agent_type and
             IssueAgentTokenRequest.agent_type. Examples: "sdr", "support", "coding",
             "ops", "research".
        capabilities:
          type: array
          items:
            type: string
          title: capabilities
          description: |-
            capabilities aligns with identity/v1 IntrospectResponse.capabilities and
             IssueAgentTokenRequest.capabilities. Used by capability-based delegation
             routing. Examples: "hubspot-write", "email-send", "code-review".
        surfaces:
          type: array
          items:
            type: string
          title: surfaces
          description: |-
            surfaces this agent can operate on. Aligns with the surface field in
             meter/v1, objectives/v1, approvals/v1. Examples: "ensemble", "chat",
             "maestro", "conductor", "slack".
        status:
          title: status
          $ref: '#/components/schemas/agents.v1.AgentStatus'
        activeConfigVersion:
          type: integer
          title: active_config_version
          format: int32
        ownerId:
          type: string
          title: owner_id
        lastHeartbeatAt:
          title: last_heartbeat_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: Agent
      additionalProperties: false
      description: |-
        Agent is the canonical agent definition record.
         The id field is the value stored in every agent_id / agent string field
         across the platform: meter/v1 RecordUsageRequest.agent_id,
         objectives/v1 Objective.agent_id, approvals/v1 ApprovalRequest.agent_id,
         governance/v1 EvaluateActionRequest.agent_id, memory/v1 Memory.agent,
         and events/v1 Change.actor_id when actor_type is "agent".
    agents.v1.AgentConfig:
      type: object
      properties:
        version:
          type: integer
          title: version
          format: int32
        agentId:
          type: string
          title: agent_id
        skillIds:
          type: array
          items:
            type: string
          title: skill_ids
          description: |-
            skill_ids reference skills/v1 Skill.id — the reusable capabilities
             this agent has loaded.
        promptBindings:
          type: object
          title: prompt_bindings
          additionalProperties:
            type: string
            title: value
          description: |-
            prompt_bindings maps prompt name to label (e.g., "sdr-outreach" -> "production").
             Aligns with prompts/v1 ResolveRequest.name and ResolveRequest.label.
        modelPreferences:
          type: object
          title: model_preferences
          additionalProperties:
            type: string
            title: value
          description: |-
            model_preferences maps surface to preferred model identifier
             (e.g., "ensemble" -> "claude-opus-4.6"). Aligns with meter/v1
             RecordUsageRequest.model and keys/v1 ResolveProviderRefRequest.provider.
        integrationIds:
          type: array
          items:
            type: string
          title: integration_ids
          description: |-
            integration_ids reference connectors/v1 Connection.id — the external
             system connections this agent is authorized to use.
        entityTypeScopes:
          type: array
          items:
            type: string
          title: entity_type_scopes
          description: |-
            entity_type_scopes restrict which entities/v1 EntityType values this
             agent can operate on. Empty means unrestricted.
        maxConcurrentObjectives:
          type: integer
          title: max_concurrent_objectives
          format: int32
          description: |-
            max_concurrent_objectives caps the number of objectives/v1 Objective
             records this agent can hold in RUNNING or BLOCKED state simultaneously.
        costBudgetUsd:
          type: number
          title: cost_budget_usd
          format: double
          description: |-
            cost_budget_usd is the per-period spend ceiling enforced against
             meter/v1 usage records for this agent.
        notificationChannel:
          type: string
          title: notification_channel
          description: |-
            notification_channel specifies the preferred notifications/v1
             DeliveryChannel for this agent's escalations. Stored as string to
             avoid cross-package import (e.g., "DELIVERY_CHANNEL_SLACK").
        parameters:
          title: parameters
          description: parameters holds arbitrary agent-specific tuning knobs.
          $ref: '#/components/schemas/google.protobuf.Struct'
        author:
          type: string
          title: author
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: AgentConfig
      additionalProperties: false
      description: |-
        AgentConfig is an immutable snapshot of everything that shapes an agent's
         behavior. Promotion and rollback are both config version reassignments —
         the same pattern as prompts/v1 Label.
    agents.v1.AgentConfig.ModelPreferencesEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: ModelPreferencesEntry
      additionalProperties: false
    agents.v1.AgentConfig.PromptBindingsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: PromptBindingsEntry
      additionalProperties: false
    agents.v1.DelegateRequest:
      type: object
      properties:
        fromAgentId:
          type: string
          title: from_agent_id
        toAgentId:
          type: string
          title: to_agent_id
          description: |-
            Specify to_agent_id for direct delegation, or required_capability for
             capability-based routing through the registry.
        requiredCapability:
          type: string
          title: required_capability
        objectiveId:
          type: string
          title: objective_id
        workflowRunId:
          type: string
          title: workflow_run_id
        workflowStepId:
          type: string
          title: workflow_step_id
        contextPayload:
          type: string
          title: context_payload
          format: byte
        reason:
          type: string
          title: reason
      title: DelegateRequest
      additionalProperties: false
    agents.v1.DelegateResponse:
      type: object
      properties:
        delegation:
          title: delegation
          $ref: '#/components/schemas/agents.v1.DelegationRecord'
      title: DelegateResponse
      additionalProperties: false
    agents.v1.DelegationRecord:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        fromAgentId:
          type: string
          title: from_agent_id
        toAgentId:
          type: string
          title: to_agent_id
        requiredCapability:
          type: string
          title: required_capability
        objectiveId:
          type: string
          title: objective_id
          description: |-
            objective_id links to the objectives/v1 Objective created for this
             delegated unit of work.
        workflowRunId:
          type: string
          title: workflow_run_id
          description: |-
            workflow_run_id and workflow_step_id link to workflows/v1 when this
             delegation occurs within a workflow execution.
        workflowStepId:
          type: string
          title: workflow_step_id
        status:
          title: status
          $ref: '#/components/schemas/agents.v1.DelegationStatus'
        contextPayload:
          type: string
          title: context_payload
          format: byte
        resultPayload:
          type: string
          title: result_payload
          format: byte
        reason:
          type: string
          title: reason
        errorMessage:
          type: string
          title: error_message
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        resolvedAt:
          title: resolved_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: DelegationRecord
      additionalProperties: false
      description: |-
        DelegationRecord tracks a typed hand-off between agents. The from_agent_id
         creates an objective (objectives/v1) or references a workflow step
         (workflows/v1 StepRun) and delegates execution to another agent resolved
         by ID or by capability through the registry.
    agents.v1.DeregisterRequest:
      type: object
      properties:
        id:
          type: string
          title: id
        reason:
          type: string
          title: reason
      title: DeregisterRequest
      additionalProperties: false
    agents.v1.DeregisterResponse:
      type: object
      title: DeregisterResponse
      additionalProperties: false
    agents.v1.GetConfigRequest:
      type: object
      properties:
        agentId:
          type: string
          title: agent_id
        version:
          type: integer
          title: version
          format: int32
      title: GetConfigRequest
      additionalProperties: false
    agents.v1.GetConfigResponse:
      type: object
      properties:
        config:
          title: config
          $ref: '#/components/schemas/agents.v1.AgentConfig'
      title: GetConfigResponse
      additionalProperties: false
    agents.v1.GetDelegationRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: GetDelegationRequest
      additionalProperties: false
    agents.v1.GetDelegationResponse:
      type: object
      properties:
        delegation:
          title: delegation
          $ref: '#/components/schemas/agents.v1.DelegationRecord'
      title: GetDelegationResponse
      additionalProperties: false
    agents.v1.GetRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: GetRequest
      additionalProperties: false
    agents.v1.GetResponse:
      type: object
      properties:
        agent:
          title: agent
          $ref: '#/components/schemas/agents.v1.Agent'
      title: GetResponse
      additionalProperties: false
    agents.v1.HeartbeatRequest:
      type: object
      properties:
        agentId:
          type: string
          title: agent_id
        status:
          title: status
          $ref: '#/components/schemas/agents.v1.AgentStatus'
        currentObjectiveIds:
          type: array
          items:
            type: string
          title: current_objective_ids
          description: |-
            current_objective_ids lists the objectives/v1 Objective.id values this
