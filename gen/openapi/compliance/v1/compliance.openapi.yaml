        agentId:
          type: string
          title: agent_id
        surface:
          type: string
          title: surface
        actionType:
          type: string
          title: action_type
        actionPayload:
          type: string
          title: action_payload
          format: byte
        riskLevel:
          title: risk_level
          $ref: '#/components/schemas/approvals.v1.RiskLevel'
        contextJson:
