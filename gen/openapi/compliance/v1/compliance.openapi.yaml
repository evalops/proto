components:
  schemas:
    approvals.v1.DecisionType:
      type: string
      title: DecisionType
      enum:
        - DECISION_TYPE_UNSPECIFIED
        - DECISION_TYPE_APPROVED
        - DECISION_TYPE_DENIED
        - DECISION_TYPE_ESCALATED
        - DECISION_TYPE_EXPIRED
        - DECISION_TYPE_AUTO_APPROVED
      description: DecisionType describes the outcome of an approval request.
    approvals.v1.RiskLevel:
      type: string
      title: RiskLevel
      enum:
        - RISK_LEVEL_UNSPECIFIED
        - RISK_LEVEL_LOW
        - RISK_LEVEL_MEDIUM
        - RISK_LEVEL_HIGH
        - RISK_LEVEL_CRITICAL
      description: RiskLevel classifies the risk of an action.
    compliance.v1.ComplianceFramework:
      type: string
      title: ComplianceFramework
      enum:
        - COMPLIANCE_FRAMEWORK_UNSPECIFIED
        - COMPLIANCE_FRAMEWORK_SOC2
        - COMPLIANCE_FRAMEWORK_HIPAA
        - COMPLIANCE_FRAMEWORK_NIST_CSF
    compliance.v1.ExportFormat:
      type: string
      title: ExportFormat
      enum:
