info:
  title: compliance.v1
paths:
  /compliance.v1.ComplianceService/GenerateEvidencePackage:
    post:
      tags:
        - compliance.v1.ComplianceService
      summary: GenerateEvidencePackage
      operationId: compliance.v1.ComplianceService.GenerateEvidencePackage
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/compliance.v1.GenerateEvidencePackageRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/compliance.v1.GenerateEvidencePackageResponse'
  /compliance.v1.ComplianceService/DetectGaps:
    post:
      tags:
        - compliance.v1.ComplianceService
      summary: DetectGaps
      operationId: compliance.v1.ComplianceService.DetectGaps
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/compliance.v1.DetectGapsRequest'
        required: true
      responses:
        default:
          description: Error
          content:
