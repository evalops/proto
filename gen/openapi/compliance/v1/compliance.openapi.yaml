      type: string
      title: ActionDecision
      enum:
        - ACTION_DECISION_UNSPECIFIED
        - ACTION_DECISION_ALLOW
        - ACTION_DECISION_DENY
        - ACTION_DECISION_REQUIRE_APPROVAL
      description: ActionDecision describes the governance decision for an action.
    governance.v1.RiskLevel:
      type: string
      title: RiskLevel
      enum:
        - RISK_LEVEL_UNSPECIFIED
        - RISK_LEVEL_LOW
        - RISK_LEVEL_MEDIUM
        - RISK_LEVEL_HIGH
        - RISK_LEVEL_CRITICAL
      description: RiskLevel classifies the risk of an action.
