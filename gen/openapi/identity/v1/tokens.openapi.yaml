openapi: 3.1.0
info:
  title: identity.v1
paths:
  /identity.v1.TokenService/Introspect:
    post:
      tags:
        - identity.v1.TokenService
      summary: Introspect
      description: Introspect validates a bearer token and returns the resolved claims.
      operationId: identity.v1.TokenService.Introspect
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/identity.v1.IntrospectRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/identity.v1.IntrospectResponse'
  /identity.v1.TokenService/IssueServiceToken:
    post:
      tags:
        - identity.v1.TokenService
      summary: IssueServiceToken
      description: IssueServiceToken mints a short-lived token for service-to-service calls.
      operationId: identity.v1.TokenService.IssueServiceToken
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/identity.v1.IssueServiceTokenRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/identity.v1.IssueServiceTokenResponse'
  /identity.v1.TokenService/IssueAgentToken:
    post:
      tags:
        - identity.v1.TokenService
      summary: IssueAgentToken
      description: IssueAgentToken mints a token scoped to an agent identity.
      operationId: identity.v1.TokenService.IssueAgentToken
      parameters:
        - name: Connect-Protocol-Version
          in: header
          required: true
          schema:
            $ref: '#/components/schemas/connect-protocol-version'
        - name: Connect-Timeout-Ms
          in: header
          schema:
            $ref: '#/components/schemas/connect-timeout-header'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/identity.v1.IssueAgentTokenRequest'
        required: true
      responses:
        default:
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/connect.error'
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/identity.v1.IssueAgentTokenResponse'
components:
  schemas:
    google.protobuf.Timestamp:
      type: string
      examples:
        - 1s
        - 1.000340012s
      format: date-time
      description: |-
        A Timestamp represents a point in time independent of any time zone or local
         calendar, encoded as a count of seconds and fractions of seconds at
         nanosecond resolution. The count is relative to an epoch at UTC midnight on
         January 1, 1970, in the proleptic Gregorian calendar which extends the
         Gregorian calendar backwards to year one.

         All minutes are 60 seconds long. Leap seconds are "smeared" so that no leap
         second table is needed for interpretation, using a [24-hour linear
         smear](https://developers.google.com/time/smear).

         The range is from 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999999Z. By
         restricting to that range, we ensure that we can convert to and from [RFC
         3339](https://www.ietf.org/rfc/rfc3339.txt) date strings.

         # Examples

         Example 1: Compute Timestamp from POSIX `time()`.

             Timestamp timestamp;
             timestamp.set_seconds(time(NULL));
             timestamp.set_nanos(0);

         Example 2: Compute Timestamp from POSIX `gettimeofday()`.

             struct timeval tv;
             gettimeofday(&tv, NULL);

             Timestamp timestamp;
             timestamp.set_seconds(tv.tv_sec);
             timestamp.set_nanos(tv.tv_usec * 1000);

         Example 3: Compute Timestamp from Win32 `GetSystemTimeAsFileTime()`.

             FILETIME ft;
             GetSystemTimeAsFileTime(&ft);
             UINT64 ticks = (((UINT64)ft.dwHighDateTime) << 32) | ft.dwLowDateTime;

             // A Windows tick is 100 nanoseconds. Windows epoch 1601-01-01T00:00:00Z
             // is 11644473600 seconds before Unix epoch 1970-01-01T00:00:00Z.
             Timestamp timestamp;
             timestamp.set_seconds((INT64) ((ticks / 10000000) - 11644473600LL));
             timestamp.set_nanos((INT32) ((ticks % 10000000) * 100));

         Example 4: Compute Timestamp from Java `System.currentTimeMillis()`.

             long millis = System.currentTimeMillis();

             Timestamp timestamp = Timestamp.newBuilder().setSeconds(millis / 1000)
                 .setNanos((int) ((millis % 1000) * 1000000)).build();

         Example 5: Compute Timestamp from Java `Instant.now()`.

             Instant now = Instant.now();

             Timestamp timestamp =
                 Timestamp.newBuilder().setSeconds(now.getEpochSecond())
                     .setNanos(now.getNano()).build();

         Example 6: Compute Timestamp from current time in Python.

             timestamp = Timestamp()
             timestamp.GetCurrentTime()

         # JSON Mapping

         In JSON format, the Timestamp type is encoded as a string in the
         [RFC 3339](https://www.ietf.org/rfc/rfc3339.txt) format. That is, the
         format is "{year}-{month}-{day}T{hour}:{min}:{sec}[.{frac_sec}]Z"
         where {year} is always expressed using four digits while {month}, {day},
         {hour}, {min}, and {sec} are zero-padded to two digits each. The fractional
         seconds, which can go up to 9 digits (i.e. up to 1 nanosecond resolution),
         are optional. The "Z" suffix indicates the timezone ("UTC"); the timezone
         is required. A proto3 JSON serializer should always use UTC (as indicated by
         "Z") when printing the Timestamp type and a proto3 JSON parser should be
         able to accept both UTC and other timezones (as indicated by an offset).

         For example, "2017-01-15T01:30:15.01Z" encodes 15.01 seconds past
         01:30 UTC on January 15, 2017.

         In JavaScript, one can convert a Date object to this format using the
         standard
         [toISOString()](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Date/toISOString)
         method. In Python, a standard `datetime.datetime` object can be converted
         to this format using
         [`strftime`](https://docs.python.org/2/library/time.html#time.strftime) with
         the time format spec '%Y-%m-%dT%H:%M:%S.%fZ'. Likewise, in Java, one can use
         the Joda Time's [`ISODateTimeFormat.dateTime()`](
         http://joda-time.sourceforge.net/apidocs/org/joda/time/format/ISODateTimeFormat.html#dateTime()
         ) to obtain a formatter capable of generating timestamps in this format.
    identity.v1.IntrospectRequest:
      type: object
      properties:
        token:
          type: string
          title: token
      title: IntrospectRequest
      additionalProperties: false
    identity.v1.IntrospectResponse:
      type: object
      properties:
        active:
          type: boolean
          title: active
        subject:
          type: string
          title: subject
        tokenType:
          type: string
          title: token_type
        service:
          type: string
          title: service
        organizationId:
          type: string
          title: organization_id
        scopes:
          type: array
          items:
            type: string
          title: scopes
        agentType:
          type: string
          title: agent_type
        capabilities:
          type: array
          items:
            type: string
          title: capabilities
        runId:
          type: string
          title: run_id
        surface:
          type: string
          title: surface
        userSubject:
          type: string
          title: user_subject
        email:
          type: string
          title: email
        name:
          type: string
          title: name
        expiresAt:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        issuedAt:
          title: issued_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: IntrospectResponse
      additionalProperties: false
      description: |-
        IntrospectResponse is the canonical introspection result.
         Superset of service-runtime/identityclient.IntrospectionResult and
         llm-gateway/internal/auth.IntrospectionResult — callers should import
         this type instead of maintaining their own structs.
    identity.v1.IssueAgentTokenRequest:
      type: object
      properties:
        agentType:
          type: string
          title: agent_type
          description: |-
            Deprecated: use agent_id instead. Ignored when agent_id is set.
             Accepted for backward compatibility when agent_id is empty.
          deprecated: true
        capabilities:
          type: array
          items:
            type: string
            deprecated: true
          title: capabilities
          description: |-
            Deprecated: use agent_id instead. Ignored when agent_id is set.
             Accepted for backward compatibility when agent_id is empty.
          deprecated: true
        scopes:
          type: array
          items:
            type: string
          title: scopes
        surface:
          type: string
          title: surface
        ttlSeconds:
          type: integer
          title: ttl_seconds
          format: int32
        agentId:
          type: string
          title: agent_id
          description: |-
            When set, the identity service looks up the agent record in registry
             and derives agent_type and capabilities from it. Takes precedence over
             the deprecated agent_type and capabilities fields. Must reference an
             existing agents/v1 Agent record.
      title: IssueAgentTokenRequest
      additionalProperties: false
    identity.v1.IssueAgentTokenResponse:
      type: object
      properties:
        token:
          type: string
          title: token
        expiresAt:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: IssueAgentTokenResponse
      additionalProperties: false
    identity.v1.IssueServiceTokenRequest:
      type: object
      properties:
        service:
          type: string
          title: service
        organizationId:
          type: string
          title: organization_id
        scopes:
          type: array
          items:
            type: string
          title: scopes
        ttlSeconds:
          type: integer
          title: ttl_seconds
          format: int32
      title: IssueServiceTokenRequest
      additionalProperties: false
    identity.v1.IssueServiceTokenResponse:
      type: object
      properties:
        token:
          type: string
          title: token
        expiresAt:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: IssueServiceTokenResponse
      additionalProperties: false
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        detail:
          $ref: '#/components/schemas/google.protobuf.Any'
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    google.protobuf.Any:
      type: object
      properties:
        type:
          type: string
        value:
          type: string
          format: binary
        debug:
          type: object
          additionalProperties: true
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
security: []
tags:
  - name: identity.v1.TokenService
    description: TokenService handles token introspection and issuance for cross-service auth.
