components:
  schemas:
    connectors.v1.AuthType:
      type: string
      title: AuthType
      enum:
        - AUTH_TYPE_UNSPECIFIED
        - AUTH_TYPE_OAUTH2
        - AUTH_TYPE_API_KEY
        - AUTH_TYPE_BASIC
        - AUTH_TYPE_MTLS
      description: AuthType describes the authentication method for a connection.
    connectors.v1.HealthStatus:
      type: string
      title: HealthStatus
      enum:
        - HEALTH_STATUS_UNSPECIFIED
        - HEALTH_STATUS_HEALTHY
        - HEALTH_STATUS_DEGRADED
        - HEALTH_STATUS_UNHEALTHY
        - HEALTH_STATUS_UNKNOWN
      description: HealthStatus describes the health state of a connection.
    connectors.v1.SourceOfTruthArea:
      type: string
      title: SourceOfTruthArea
      enum:
        - SOURCE_OF_TRUTH_AREA_UNSPECIFIED
        - SOURCE_OF_TRUTH_AREA_CRM
        - SOURCE_OF_TRUTH_AREA_SUPPORT
        - SOURCE_OF_TRUTH_AREA_BILLING
        - SOURCE_OF_TRUTH_AREA_ANALYTICS
        - SOURCE_OF_TRUTH_AREA_HRIS
      description: SourceOfTruthArea identifies a functional domain for source-of-truth resolution.
    connectors.v1.Connection:
      type: object
      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        providerId:
          type: string
          title: provider_id
        displayName:
          type: string
          title: display_name
        authType:
          title: auth_type
          $ref: '#/components/schemas/connectors.v1.AuthType'
        scopes:
          type: array
          items:
            type: string
          title: scopes
        healthStatus:
          title: health_status
          $ref: '#/components/schemas/connectors.v1.HealthStatus'
        lastHealthyAt:
          title: last_healthy_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        updatedAt:
          title: updated_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        credentialRefs:
          type: object
          title: credential_refs
          additionalProperties:
            type: string
            title: value
          description: |-
            credential_refs mirrors non-secret credential references such as vault or
             secret-manager handles. Raw credential material must not be returned here.
      title: Connection
      additionalProperties: false
      description: Connection is the canonical external integration connection record.
    connectors.v1.Connection.CredentialRefsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: CredentialRefsEntry
      additionalProperties: false
    connectors.v1.ConnectionHealth:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/connectors.v1.HealthStatus'
        latencyMs:
          type: integer
          title: latency_ms
          format: int32
        lastCheckAt:
          title: last_check_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        errorMessage:
          type: string
          title: error_message
      title: ConnectionHealth
      additionalProperties: false
      description: ConnectionHealth provides detailed health information for a connection.
    connectors.v1.DegradedReadPolicy:
      type: object
      properties:
        mode:
          type: string
          title: mode
        allowedIntegrations:
          type: array
          items:
            type: string
          title: allowed_integrations
        maxAgeMinutes:
          type: integer
          title: max_age_minutes
          format: int32
        queuePrimaryRefresh:
          type: boolean
          title: queue_primary_refresh
      title: DegradedReadPolicy
      additionalProperties: false
      description: DegradedReadPolicy defines behavior when the primary source is unavailable.
    connectors.v1.GetCapabilitiesRequest:
      type: object
      properties:
        connectionId:
          type: string
          title: connection_id
      title: GetCapabilitiesRequest
      additionalProperties: false
    connectors.v1.GetCapabilitiesResponse:
      type: object
      properties:
        capabilities:
          type: array
          items:
            type: string
          title: capabilities
      title: GetCapabilitiesResponse
      additionalProperties: false
    connectors.v1.GetConnectionRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: GetConnectionRequest
      additionalProperties: false
    connectors.v1.GetConnectionResponse:
      type: object
      properties:
        connection:
          title: connection
          $ref: '#/components/schemas/connectors.v1.Connection'
      title: GetConnectionResponse
      additionalProperties: false
    connectors.v1.GetDegradedReadPolicyRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
      title: GetDegradedReadPolicyRequest
      additionalProperties: false
    connectors.v1.GetDegradedReadPolicyResponse:
      type: object
      properties:
        policy:
          title: policy
          $ref: '#/components/schemas/connectors.v1.DegradedReadPolicy'
      title: GetDegradedReadPolicyResponse
      additionalProperties: false
    connectors.v1.GetHealthRequest:
      type: object
      properties:
        connectionId:
          type: string
          title: connection_id
      title: GetHealthRequest
      additionalProperties: false
    connectors.v1.GetHealthResponse:
      type: object
      properties:
        health:
          title: health
          $ref: '#/components/schemas/connectors.v1.ConnectionHealth'
      title: GetHealthResponse
      additionalProperties: false
    connectors.v1.ListConnectionsRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        limit:
          type: integer
          title: limit
          format: int32
        offset:
          type: integer
          title: offset
