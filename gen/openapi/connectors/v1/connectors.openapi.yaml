          type: integer
          title: total
          format: int32
      title: ListConnectionsResponse
      additionalProperties: false
    connectors.v1.RefreshConnectionRequest:
      type: object
      properties:
        id:
          type: string
          title: id
      title: RefreshConnectionRequest
      additionalProperties: false
    connectors.v1.RefreshConnectionResponse:
      type: object
      properties:
        connection:
          title: connection
          $ref: '#/components/schemas/connectors.v1.Connection'
      title: RefreshConnectionResponse
      additionalProperties: false
    connectors.v1.RegisterConnectionRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        providerId:
          type: string
          title: provider_id
        displayName:
          type: string
          title: display_name
        authType:
          title: auth_type
          $ref: '#/components/schemas/connectors.v1.AuthType'
        scopes:
          type: array
          items:
            type: string
          title: scopes
        credentials:
          type: object
          title: credentials
          additionalProperties:
            type: string
            title: value
      title: RegisterConnectionRequest
      additionalProperties: false
    connectors.v1.RegisterConnectionRequest.CredentialsEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: string
          title: value
      title: CredentialsEntry
      additionalProperties: false
    connectors.v1.RegisterConnectionResponse:
      type: object
      properties:
        connection:
          title: connection
          $ref: '#/components/schemas/connectors.v1.Connection'
