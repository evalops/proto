      properties:
        id:
          type: string
          title: id
        workspaceId:
          type: string
          title: workspace_id
        scope:
          type: string
          title: scope
        reason:
          type: string
          title: reason
        createdBy:
          type: string
          title: created_by
        active:
          type: boolean
          title: active
        createdAt:
          title: created_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
        expiresAt:
          title: expires_at
          $ref: '#/components/schemas/google.protobuf.Timestamp'
      title: LegalHold
      additionalProperties: false
      description: LegalHold prevents data deletion for compliance or legal reasons.
    governance.v1.PIIDetectionResult:
      type: object
      properties:
        spans:
          type: array
          items:
            $ref: '#/components/schemas/governance.v1.PIISpan'
          title: spans
      title: PIIDetectionResult
      additionalProperties: false
      description: PIIDetectionResult contains all PII spans found in a text.
    governance.v1.PIISpan:
      type: object
      properties:
        startOffset:
          type: integer
          title: start_offset
          format: int32
        endOffset:
          type: integer
          title: end_offset
          format: int32
        category:
          title: category
          $ref: '#/components/schemas/governance.v1.PIICategory'
        text:
          type: string
          title: text
        confidence:
          type: number
          title: confidence
          format: float
      title: PIISpan
      additionalProperties: false
      description: PIISpan identifies a single occurrence of PII within text.
    governance.v1.RetentionPolicy:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        retentionDays:
          type: integer
          title: retention_days
          format: int32
        legalHoldOverride:
          type: boolean
          title: legal_hold_override
      title: RetentionPolicy
      additionalProperties: false
      description: RetentionPolicy defines data retention rules for a workspace.
    governance.v1.SafetyPolicy:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        rules:
          type: array
          items:
            $ref: '#/components/schemas/governance.v1.SafetyRule'
          title: rules
      title: SafetyPolicy
      additionalProperties: false
      description: SafetyPolicy defines the safety rules for a workspace.
    governance.v1.SafetyRule:
      type: object
      properties:
        id:
          type: string
          title: id
        pattern:
          type: string
          title: pattern
        action:
          title: action
          $ref: '#/components/schemas/governance.v1.ActionDecision'
        riskLevel:
          title: risk_level
          $ref: '#/components/schemas/governance.v1.RiskLevel'
        description:
          type: string
          title: description
      title: SafetyRule
      additionalProperties: false
      description: SafetyRule is a single rule within a safety policy.
    governance.v1.SetLegalHoldRequest:
      type: object
      properties:
        hold:
          title: hold
          $ref: '#/components/schemas/governance.v1.LegalHold'
      title: SetLegalHoldRequest
