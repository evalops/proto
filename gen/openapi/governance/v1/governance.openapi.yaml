      type: object
      properties:
        result:
          title: result
          $ref: '#/components/schemas/governance.v1.PIIDetectionResult'
      title: DetectPIIResponse
      additionalProperties: false
    governance.v1.EvaluateActionRequest:
      type: object
      properties:
        workspaceId:
          type: string
          title: workspace_id
        agentId:
          type: string
          title: agent_id
        actionType:
          type: string
          title: action_type
        actionPayload:
          type: string
          title: action_payload
