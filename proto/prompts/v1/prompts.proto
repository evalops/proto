syntax = "proto3";

package prompts.v1;

option go_package = "github.com/evalops/proto/gen/go/prompts/v1;promptsv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// Prompt is a named, versioned prompt template scoped to an organization.
// Used by all surfaces (Maestro, Ensemble, Aria) and by Fermata for eval
// linkage. The canonical cross-service contract for prompt governance.
message Prompt {
  string id = 1;
  string organization_id = 2;
  string name = 3;
  string surface = 4;
  repeated string tags = 5;
  google.protobuf.Struct metadata = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

// Version is an immutable snapshot of prompt content.
message Version {
  string id = 1;
  string prompt_id = 2;
  int32 version = 3;
  string content = 4;
  string model = 5;
  string hash = 6;
  string author = 7;
  google.protobuf.Timestamp created_at = 8;
  // Expected interpolation variable names (e.g., "customer_name", "deal_stage").
  // Declaration only — rendering is the consumer's responsibility.
  repeated string variables = 9;
  // Per-model token counts for context window budgeting.
  // Populated lazily by gateway or fermata after first tokenization.
  map<string, int64> token_counts = 10;
}

// Label is a mutable pointer from (org, prompt, label_name) to a version.
// The primary resolution mechanism — code references labels, not version numbers.
// Promotion and rollback are both label reassignments.
message Label {
  string prompt_id = 1;
  string name = 2;            // "production", "staging", "canary"
  int32 version = 3;
  string actor = 4;
  int32 rollback_from = 5;    // set when this assignment is a rollback
  google.protobuf.Timestamp assigned_at = 6;
}

// Deployment is an audit record of a label assignment. Retained for compliance.
// Every AssignLabel call produces both a Label update and a Deployment record.
message Deployment {
  string id = 1;
  string prompt_id = 2;
  string version_id = 3;
  int32 version = 4;
  string surface = 5;         // label name (kept as "surface" for wire compat)
  string env = 6;             // deprecated — use label name
  string actor = 7;
  google.protobuf.Timestamp created_at = 8;
  int32 rollback_from = 9;
}

// EvalLink connects a prompt version to a Fermata evaluation result.
message EvalLink {
  string id = 1;
  string prompt_id = 2;
  string version_id = 3;
  string eval_run_id = 4;
  double score = 5;
  bool pass = 6;
  string eval_url = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ResolvedPrompt is returned by the bulk-load endpoint for gateway startup.
message ResolvedPrompt {
  string prompt_name = 1;
  string prompt_id = 2;
  string label = 3;
  Version version = 4;
}

// PromptService defines the prompt registry API.
service PromptService {
  rpc CreatePrompt(CreatePromptRequest) returns (Prompt);
  rpc GetPrompt(GetPromptRequest) returns (Prompt);
  rpc ListPrompts(ListPromptsRequest) returns (ListPromptsResponse);
  rpc CreateVersion(CreateVersionRequest) returns (Version);
  rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse);
  rpc AssignLabel(AssignLabelRequest) returns (Label);
  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse);
  rpc ListDeployments(ListDeploymentsRequest) returns (ListDeploymentsResponse);
  rpc LinkEval(LinkEvalRequest) returns (EvalLink);
  rpc Resolve(ResolveRequest) returns (ResolveResponse);
  rpc ResolveAll(ResolveAllRequest) returns (ResolveAllResponse);
}

message CreatePromptRequest {
  string name = 1;
  string surface = 2;
  repeated string tags = 3;
  google.protobuf.Struct metadata = 4;
}

message GetPromptRequest {
  string id = 1;
}

message ListPromptsRequest {
  string surface = 1;
  string tag = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListPromptsResponse {
  repeated Prompt prompts = 1;
  int32 total = 2;
  bool has_more = 3;
}

message CreateVersionRequest {
  string prompt_id = 1;
  string content = 2;
  string model = 3;
  string author = 4;
  repeated string variables = 5;
}

message ListVersionsRequest {
  string prompt_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListVersionsResponse {
  repeated Version versions = 1;
  int32 total = 2;
  bool has_more = 3;
}

// AssignLabelRequest atomically moves a label pointer to a version.
// Used for promotion, rollback, and canary assignment.
message AssignLabelRequest {
  string prompt_id = 1;
  string name = 2;            // label name: "production", "staging", "canary"
  int32 version = 3;          // target version number
  string actor = 4;           // who is making the assignment
  int32 rollback_from = 5;    // set when this is a rollback (the version being rolled back from)
}

message ListLabelsRequest {
  string prompt_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListLabelsResponse {
  repeated Label labels = 1;
  int32 total = 2;
  bool has_more = 3;
}

message ListDeploymentsRequest {
  string prompt_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListDeploymentsResponse {
  repeated Deployment deployments = 1;
  int32 total = 2;
  bool has_more = 3;
}

message LinkEvalRequest {
  string prompt_id = 1;
  string version_id = 2;
  string eval_run_id = 3;
  double score = 4;
  bool pass = 5;
  string eval_url = 6;
}

// ResolveRequest is the hot-path lookup. Label defaults to "production".
// Consumers MUST pin the resolved version at session/sequence start.
message ResolveRequest {
  string name = 1;
  string label = 2;           // default: "production"
}

message ResolveResponse {
  Version version = 1;
}

// ResolveAllRequest returns all active prompts for a label — gateway startup path.
message ResolveAllRequest {
  string label = 1;           // default: "production"
}

message ResolveAllResponse {
  repeated ResolvedPrompt prompts = 1;
}
