syntax = "proto3";

package notifications.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/evalops/proto/gen/go/notifications/v1;notificationsv1";

// NotificationService manages delivery of notifications across channels.
service NotificationService {
  rpc Send(SendRequest) returns (SendResponse);
  rpc SendBatch(SendBatchRequest) returns (SendBatchResponse);
  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);
  rpc SetPreferences(SetPreferencesRequest) returns (SetPreferencesResponse);
  rpc ListHistory(ListHistoryRequest) returns (ListHistoryResponse);
  rpc RegisterChannel(RegisterChannelRequest) returns (RegisterChannelResponse);
  rpc GetDeliveryStatus(GetDeliveryStatusRequest) returns (GetDeliveryStatusResponse);
  rpc UpsertTemplate(UpsertTemplateRequest) returns (UpsertTemplateResponse);
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
}

// DeliveryChannel identifies the notification delivery channel.
enum DeliveryChannel {
  DELIVERY_CHANNEL_UNSPECIFIED = 0;
  DELIVERY_CHANNEL_SLACK = 1;
  DELIVERY_CHANNEL_EMAIL = 2;
  DELIVERY_CHANNEL_WEBHOOK = 3;
  DELIVERY_CHANNEL_IN_APP = 4;
}

// Priority describes the urgency of a notification.
enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  PRIORITY_LOW = 1;
  PRIORITY_NORMAL = 2;
  PRIORITY_HIGH = 3;
  PRIORITY_URGENT = 4;
}

// NotificationCategory groups notifications for routing and template selection.
enum NotificationCategory {
  NOTIFICATION_CATEGORY_UNSPECIFIED = 0;
  NOTIFICATION_CATEGORY_APPROVAL_REQUEST = 1;
  NOTIFICATION_CATEGORY_BUDGET_ALERT = 2;
  NOTIFICATION_CATEGORY_PII_DETECTION = 3;
  NOTIFICATION_CATEGORY_INCIDENT = 4;
  NOTIFICATION_CATEGORY_REPORT = 5;
  NOTIFICATION_CATEGORY_INTEGRATION = 6;
  NOTIFICATION_CATEGORY_DIGEST = 7;
  NOTIFICATION_CATEGORY_GENERAL = 8;
}

// DeliveryStatus describes the delivery state of a notification.
enum DeliveryStatus {
  DELIVERY_STATUS_UNSPECIFIED = 0;
  DELIVERY_STATUS_PENDING = 1;
  DELIVERY_STATUS_SENT = 2;
  DELIVERY_STATUS_DELIVERED = 3;
  DELIVERY_STATUS_FAILED = 4;
  DELIVERY_STATUS_BOUNCED = 5;
  DELIVERY_STATUS_QUEUED = 6;
}

// Notification is the canonical notification record.
message Notification {
  string id = 1;
  string workspace_id = 2;
  string recipient_id = 3;
  DeliveryChannel channel = 4;
  Priority priority = 5;
  string subject = 6;
  string body = 7;
  string metadata_json = 8;
  DeliveryStatus delivery_status = 9;
  google.protobuf.Timestamp sent_at = 10;
  google.protobuf.Timestamp delivered_at = 11;
  NotificationCategory category = 12;
  string template_name = 13;
}

// EscalationRule defines automatic escalation when a notification is unacknowledged.
message EscalationRule {
  int32 if_unacknowledged_after_seconds = 1;
  DeliveryChannel escalate_to_channel = 2;
}

// NotificationPreferences stores a user's notification settings.
message NotificationPreferences {
  string user_id = 1;
  string workspace_id = 2;
  DeliveryChannel default_channel = 3;
  string quiet_hours_start = 4;
  string quiet_hours_end = 5;
  repeated EscalationRule escalation_rules = 6;
  repeated CategoryChannelPreference category_channels = 7;
  repeated DigestPreference digest_preferences = 8;
}

// CategoryChannelPreference overrides delivery routing for a specific category.
message CategoryChannelPreference {
  NotificationCategory category = 1;
  DeliveryChannel channel = 2;
}

// NotificationTemplate defines a reusable notification subject/body template.
message NotificationTemplate {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  NotificationCategory category = 4;
  DeliveryChannel channel = 5;
  string subject_template = 6;
  string body_template = 7;
  repeated string required_variables = 8;
  bool built_in = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// DigestPreference controls batching for a category/channel pair.
message DigestPreference {
  NotificationCategory category = 1;
  DeliveryChannel channel = 2;
  int32 window_seconds = 3;
  bool enabled = 4;
}

message SendRequest {
  string workspace_id = 1;
  string recipient_id = 2;
  // If channel is unspecified, the notifications service may resolve it from
  // the recipient's preferences before falling back to a safe default.
  DeliveryChannel channel = 3;
  Priority priority = 4;
  string subject = 5;
  string body = 6;
  string metadata_json = 7;
  NotificationCategory category = 8;
  string template_name = 9;
  string template_variables_json = 10;
}

message SendResponse {
  Notification notification = 1;
}

message SendBatchRequest {
  repeated SendRequest notifications = 1;
}

message SendBatchResponse {
  repeated Notification notifications = 1;
  int32 failed_count = 2;
}

message GetPreferencesRequest {
  string user_id = 1;
  string workspace_id = 2;
}

message GetPreferencesResponse {
  NotificationPreferences preferences = 1;
}

message SetPreferencesRequest {
  NotificationPreferences preferences = 1;
}

message SetPreferencesResponse {
  NotificationPreferences preferences = 1;
}

message ListHistoryRequest {
  string workspace_id = 1;
  string recipient_id = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListHistoryResponse {
  repeated Notification notifications = 1;
  int32 total = 2;
}

message RegisterChannelRequest {
  string workspace_id = 1;
  DeliveryChannel channel = 2;
  map<string, string> config = 3;
}

message RegisterChannelResponse {
  bool success = 1;
}

message GetDeliveryStatusRequest {
  string notification_id = 1;
}

message GetDeliveryStatusResponse {
  DeliveryStatus status = 1;
  google.protobuf.Timestamp last_updated_at = 2;
  string error_message = 3;
}

message UpsertTemplateRequest {
  NotificationTemplate template = 1;
}

message UpsertTemplateResponse {
  NotificationTemplate template = 1;
}

message ListTemplatesRequest {
  string workspace_id = 1;
  NotificationCategory category = 2;
  DeliveryChannel channel = 3;
  bool include_built_in = 4;
}

message ListTemplatesResponse {
  repeated NotificationTemplate templates = 1;
}
