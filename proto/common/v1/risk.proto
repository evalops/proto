syntax = "proto3";

package common.v1;

option go_package = "github.com/evalops/proto/gen/go/common/v1;commonv1";

// RiskLevel classifies the risk of an action.
enum RiskLevel {
  RISK_LEVEL_UNSPECIFIED = 0;
  RISK_LEVEL_LOW = 1;
  RISK_LEVEL_MEDIUM = 2;
  RISK_LEVEL_HIGH = 3;
  RISK_LEVEL_CRITICAL = 4;
}
