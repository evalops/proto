syntax = "proto3";

package skills.v1;

option go_package = "github.com/evalops/proto/gen/go/skills/v1;skillsv1";

import "google/protobuf/timestamp.proto";

// SkillService manages reusable agent skill definitions and versions.
service SkillService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc List(ListRequest) returns (ListResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc CreateVersion(CreateVersionRequest) returns (CreateVersionResponse);
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
  rpc ListVersions(ListVersionsRequest) returns (ListVersionsResponse);
  rpc Search(SearchRequest) returns (SearchResponse);
  rpc Import(ImportRequest) returns (ImportResponse);
  rpc Export(ExportRequest) returns (ExportResponse);
}

// SkillScope controls the visibility of a skill.
enum SkillScope {
  SKILL_SCOPE_UNSPECIFIED = 0;
  SKILL_SCOPE_GLOBAL = 1;
  SKILL_SCOPE_WORKSPACE = 2;
  SKILL_SCOPE_PERSONAL = 3;
}

// Skill is the canonical skill definition.
message Skill {
  string id = 1;
  string workspace_id = 2;
  string owner_id = 3;
  string name = 4;
  string description = 5;
  SkillScope scope = 6;
  string content = 7;
  int32 current_version = 8;
  repeated string tags = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

// SkillVersion is an immutable snapshot of a skill's content.
message SkillVersion {
  string id = 1;
  string skill_id = 2;
  int32 version_number = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  string created_by = 6;
}

message CreateRequest {
  string workspace_id = 1;
  string owner_id = 2;
  string name = 3;
  string description = 4;
  SkillScope scope = 5;
  string content = 6;
  repeated string tags = 7;
}

message CreateResponse {
  Skill skill = 1;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  Skill skill = 1;
}

message ListRequest {
  string workspace_id = 1;
  SkillScope scope = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListResponse {
  repeated Skill skills = 1;
  int32 total = 2;
}

message UpdateRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  SkillScope scope = 4;
  string content = 5;
  repeated string tags = 6;
}

message UpdateResponse {
  Skill skill = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {}

message CreateVersionRequest {
  string skill_id = 1;
  string content = 2;
  string created_by = 3;
}

message CreateVersionResponse {
  SkillVersion version = 1;
}

message GetVersionRequest {
  string skill_id = 1;
  int32 version_number = 2;
}

message GetVersionResponse {
  SkillVersion version = 1;
}

message ListVersionsRequest {
  string skill_id = 1;
}

message ListVersionsResponse {
  repeated SkillVersion versions = 1;
}

message SearchRequest {
  string workspace_id = 1;
  string query = 2;
  SkillScope scope = 3;
  repeated string tags = 4;
  int32 limit = 5;
  int32 offset = 6;
}

message SearchResponse {
  repeated Skill skills = 1;
  int32 total = 2;
}

message ImportRequest {
  string workspace_id = 1;
  bytes data = 2;
  string format = 3;
}

message ImportResponse {
  Skill skill = 1;
}

message ExportRequest {
  string id = 1;
  string format = 2;
}

message ExportResponse {
  bytes data = 1;
  string format = 2;
}
