syntax = "proto3";

package meter.v1;

option go_package = "github.com/evalops/proto/gen/go/meter/v1;meterv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// MeterService records and queries usage across EvalOps services.
service MeterService {
  rpc RecordUsage(RecordUsageRequest) returns (RecordUsageResponse);
  rpc RecordUsageBatch(RecordUsageBatchRequest) returns (RecordUsageBatchResponse);
  rpc QueryUsage(QueryUsageRequest) returns (QueryUsageResponse);
  rpc GetUsageSummary(GetUsageSummaryRequest) returns (GetUsageSummaryResponse);
  rpc GetMeterSummary(GetMeterSummaryRequest) returns (GetMeterSummaryResponse);
  rpc IngestWideEvent(IngestWideEventRequest) returns (IngestWideEventResponse);
  rpc QueryWideEvents(QueryWideEventsRequest) returns (QueryWideEventsResponse);
  rpc GetEventDashboard(GetEventDashboardRequest) returns (GetEventDashboardResponse);
}

enum SummaryGroupBy {
  SUMMARY_GROUP_BY_UNSPECIFIED = 0;
  SUMMARY_GROUP_BY_MODEL = 1;
  SUMMARY_GROUP_BY_PROVIDER = 2;
  SUMMARY_GROUP_BY_TEAM = 3;
  SUMMARY_GROUP_BY_AGENT = 4;
  SUMMARY_GROUP_BY_SURFACE = 5;
  SUMMARY_GROUP_BY_METADATA = 6;
}

message RecordUsageRequest {
  string team_id = 1;
  string agent_id = 2;
  string surface = 3;
  string event_type = 4;
  string model = 5;
  string provider = 6;
  int64 input_tokens = 7;
  int64 output_tokens = 8;
  int64 cache_read_tokens = 9;
  int64 cache_write_tokens = 10;
  double total_cost_usd = 11;
  string request_id = 12;
  google.protobuf.Struct metadata = 13;
  google.protobuf.Struct data = 14;
}

message RecordUsageResponse {
  UsageRecord record = 1;
}

message RecordUsageBatchRequest {
  repeated RecordUsageRequest records = 1;
}

message RecordUsageBatchResponse {
  repeated UsageRecord records = 1;
}

message UsageRecord {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string organization_id = 3;
  string team_id = 4;
  string agent_id = 5;
  string surface = 6;
  string event_type = 7;
  string model = 8;
  string provider = 9;
  int64 input_tokens = 10;
  int64 output_tokens = 11;
  int64 cache_read_tokens = 12;
  int64 cache_write_tokens = 13;
  double total_cost_usd = 14;
  string request_id = 15;
  google.protobuf.Struct data = 16;
  google.protobuf.Struct metadata = 17;
  google.protobuf.Timestamp created_at = 18;
}

message QueryUsageRequest {
  string team_id = 1;
  string agent_id = 2;
  string event_type = 3;
  string model = 4;
  string provider = 5;
  string metadata_key = 6;
  string metadata_value = 7;
  google.protobuf.Timestamp start_time = 8;
  google.protobuf.Timestamp end_time = 9;
}

message QueryUsageResponse {
  repeated UsageRecord records = 1;
}

message GetUsageSummaryRequest {
  string team_id = 1;
  string agent_id = 2;
  SummaryGroupBy group_by = 3;
  string group_metadata_key = 4;
  string metadata_key = 5;
  string metadata_value = 6;
  google.protobuf.Timestamp start_time = 7;
  google.protobuf.Timestamp end_time = 8;
}

message UsageSummary {
  string key = 1;
  int64 total_input_tokens = 2;
  int64 total_output_tokens = 3;
  int64 total_cache_read_tokens = 4;
  int64 total_cache_write_tokens = 5;
  double total_cost_usd = 6;
  int64 record_count = 7;
}

message GetUsageSummaryResponse {
  repeated UsageSummary buckets = 1;
}

message GetMeterSummaryRequest {
  string meter_id = 1;
  string team_id = 2;
  string agent_id = 3;
  SummaryGroupBy group_by = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
}

message MeterSummaryBucket {
  string key = 1;
  double value = 2;
  int64 record_count = 3;
}

message GetMeterSummaryResponse {
  string meter_id = 1;
  repeated MeterSummaryBucket buckets = 2;
}

message WideEventMetrics {
  int64 input_tokens = 1;
  int64 output_tokens = 2;
  int64 cache_read_tokens = 3;
  int64 cache_write_tokens = 4;
  double total_cost_usd = 5;
  int64 duration_ms = 6;
  int64 time_to_first_token_ms = 7;
  int64 tool_calls_count = 8;
}

message IngestWideEventRequest {
  google.protobuf.Timestamp timestamp = 1;
  string team_id = 2;
  string agent_id = 3;
  string surface = 4;
  string event_type = 5;
  string model = 6;
  string provider = 7;
  string request_id = 8;
  google.protobuf.Struct metadata = 9;
  google.protobuf.Struct data = 10;
  WideEventMetrics metrics = 11;
}

message WideEvent {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string organization_id = 3;
  string team_id = 4;
  string agent_id = 5;
  string surface = 6;
  string event_type = 7;
  string model = 8;
  string provider = 9;
  string request_id = 10;
  google.protobuf.Struct metadata = 11;
  google.protobuf.Struct data = 12;
  WideEventMetrics metrics = 13;
  google.protobuf.Timestamp created_at = 14;
}

message IngestWideEventResponse {
  WideEvent event = 1;
  bool budget_exceeded = 2;      // true when this event pushed the agent or team over budget
  string budget_message = 3;     // human-readable budget status, empty when within budget
}

message QueryWideEventsRequest {
  string team_id = 1;
  string agent_id = 2;
  string surface = 3;
  string event_type = 4;
  string model = 5;
  string provider = 6;
  string metadata_key = 7;
  string metadata_value = 8;
  google.protobuf.Timestamp start_time = 9;
  google.protobuf.Timestamp end_time = 10;
  int32 limit = 11;
  int32 offset = 12;
}

message QueryWideEventsResponse {
  repeated WideEvent events = 1;
  int32 total = 2;
  bool has_more = 3;
}

message GetEventDashboardRequest {
  string team_id = 1;
  string agent_id = 2;
  string surface = 3;
  string event_type = 4;
  string model = 5;
  string provider = 6;
  string metadata_key = 7;
  string metadata_value = 8;
  google.protobuf.Timestamp start_time = 9;
  google.protobuf.Timestamp end_time = 10;
  int32 top_n = 11;
}

message EventDashboardBucket {
  string key = 1;
  int64 count = 2;
  double total_cost_usd = 3;
}

message GetEventDashboardResponse {
  int64 total_events = 1;
  int64 total_input_tokens = 2;
  int64 total_output_tokens = 3;
  int64 total_cache_read_tokens = 4;
  int64 total_cache_write_tokens = 5;
  double total_cost_usd = 6;
  repeated EventDashboardBucket by_event_type = 7;
  repeated EventDashboardBucket by_surface = 8;
  repeated EventDashboardBucket by_model = 9;
  repeated EventDashboardBucket by_provider = 10;
}
