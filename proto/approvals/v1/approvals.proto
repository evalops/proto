syntax = "proto3";

package approvals.v1;

option go_package = "github.com/evalops/proto/gen/go/approvals/v1;approvalsv1";

import "google/protobuf/timestamp.proto";

// ApprovalService manages approval workflows for agent actions.
service ApprovalService {
  rpc RequestApproval(RequestApprovalRequest) returns (RequestApprovalResponse);
  rpc ResolveApproval(ResolveApprovalRequest) returns (ResolveApprovalResponse);
  rpc GetPolicy(GetPolicyRequest) returns (GetPolicyResponse);
  rpc SetPolicy(SetPolicyRequest) returns (SetPolicyResponse);
  rpc ListPending(ListPendingRequest) returns (ListPendingResponse);
  rpc GetHabits(GetHabitsRequest) returns (GetHabitsResponse);
  rpc Escalate(EscalateRequest) returns (EscalateResponse);
  rpc GetApproval(GetApprovalRequest) returns (GetApprovalResponse);
}

// RiskLevel classifies the risk of an action.
enum RiskLevel {
  RISK_LEVEL_UNSPECIFIED = 0;
  RISK_LEVEL_LOW = 1;
  RISK_LEVEL_MEDIUM = 2;
  RISK_LEVEL_HIGH = 3;
  RISK_LEVEL_CRITICAL = 4;
}

// DecisionType describes the outcome of an approval request.
enum DecisionType {
  DECISION_TYPE_UNSPECIFIED = 0;
  DECISION_TYPE_APPROVED = 1;
  DECISION_TYPE_DENIED = 2;
  DECISION_TYPE_ESCALATED = 3;
  DECISION_TYPE_EXPIRED = 4;
}

// ActionAuthority describes the authority level for an action.
enum ActionAuthority {
  ACTION_AUTHORITY_UNSPECIFIED = 0;
  ACTION_AUTHORITY_OWN = 1;
  ACTION_AUTHORITY_RECOMMEND = 2;
  ACTION_AUTHORITY_REQUIRE_APPROVAL = 3;
}

// ApprovalRequest is the canonical approval request record.
message ApprovalRequest {
  string id = 1;
  string workspace_id = 2;
  string approver_user_id = 11;
  string agent_id = 3;
  string surface = 4;
  string action_type = 5;
  bytes action_payload = 6;
  RiskLevel risk_level = 7;
  string context_json = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

// ApprovalRule defines a single rule within an approval policy.
message ApprovalRule {
  string id = 1;
  string action_type = 2;
  RiskLevel min_risk_level = 3;
  ActionAuthority authority = 4;
  string description = 5;
}

// ApprovalPolicy defines the set of rules for a workspace.
message ApprovalPolicy {
  string workspace_id = 1;
  repeated ApprovalRule rules = 2;
  bool auto_approve_enabled = 3;
  float auto_approve_threshold = 4;
  int32 min_observations = 5;
  repeated RiskLevel excluded_risk_levels = 6;
}

// ApprovalDecision records a decision made on an approval request.
message ApprovalDecision {
  string id = 1;
  string approval_request_id = 2;
  DecisionType decision = 3;
  string decided_by = 4;
  string reason = 5;
  google.protobuf.Timestamp decided_at = 6;
}

// ApprovalHabit captures learned patterns for auto-approval.
message ApprovalHabit {
  string pattern = 1;
  float auto_approve_confidence = 2;
  int32 observation_count = 3;
  int32 approved_count = 4;
}

message RequestApprovalRequest {
  string workspace_id = 1;
  string approver_user_id = 8;
  string agent_id = 2;
  string surface = 3;
  string action_type = 4;
  bytes action_payload = 5;
  RiskLevel risk_level = 6;
  string context_json = 7;
}

message RequestApprovalResponse {
  ApprovalRequest approval_request = 1;
  ApprovalDecision decision = 2;
  bool auto_approved = 3;
}

message ResolveApprovalRequest {
  string approval_request_id = 1;
  DecisionType decision = 2;
  string decided_by = 3;
  string reason = 4;
}

message ResolveApprovalResponse {
  ApprovalDecision decision = 1;
}

message GetPolicyRequest {
  string workspace_id = 1;
}

message GetPolicyResponse {
  ApprovalPolicy policy = 1;
}

message SetPolicyRequest {
  ApprovalPolicy policy = 1;
}

message SetPolicyResponse {
  ApprovalPolicy policy = 1;
}

message ListPendingRequest {
  string workspace_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListPendingResponse {
  repeated ApprovalRequest requests = 1;
  int32 total = 2;
}

message GetHabitsRequest {
  string workspace_id = 1;
}

message GetHabitsResponse {
  repeated ApprovalHabit habits = 1;
}

message EscalateRequest {
  string approval_request_id = 1;
  string reason = 2;
}

message EscalateResponse {
  ApprovalRequest approval_request = 1;
}

message GetApprovalRequest {
  string approval_request_id = 1;
  string workspace_id = 2;
}

message GetApprovalResponse {
  ApprovalRequest approval_request = 1;
  repeated ApprovalDecision decisions = 2;
  string state = 3;
}
