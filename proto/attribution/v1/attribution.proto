syntax = "proto3";

package attribution.v1;

import "google/protobuf/timestamp.proto";
import "traces/v1/traces.proto";

option go_package = "github.com/evalops/proto/gen/go/attribution/v1;attributionv1";

// AttributionService computes revenue attribution and ROI across traces and usage.
service AttributionService {
  rpc GenerateReport(GenerateReportRequest) returns (GenerateReportResponse);
  rpc GetReport(GetReportRequest) returns (GetReportResponse);
  rpc ListReports(ListReportsRequest) returns (ListReportsResponse);
  rpc ExportReport(ExportReportRequest) returns (ExportReportResponse);
  rpc RecordSignals(RecordSignalsRequest) returns (RecordSignalsResponse);
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);
  rpc ListSnapshots(ListSnapshotsRequest) returns (ListSnapshotsResponse);
}

enum AttributionModel {
  ATTRIBUTION_MODEL_UNSPECIFIED = 0;
  ATTRIBUTION_MODEL_DIRECT = 1;
  ATTRIBUTION_MODEL_ASSISTED = 2;
  ATTRIBUTION_MODEL_INFLUENCED = 3;
}

enum ReportExportFormat {
  REPORT_EXPORT_FORMAT_UNSPECIFIED = 0;
  REPORT_EXPORT_FORMAT_JSON = 1;
  REPORT_EXPORT_FORMAT_CSV = 2;
}

enum AttributionSubjectKind {
  ATTRIBUTION_SUBJECT_KIND_UNSPECIFIED = 0;
  ATTRIBUTION_SUBJECT_KIND_DEAL = 1;
  ATTRIBUTION_SUBJECT_KIND_OBJECTIVE = 2;
}

enum AttributionSignalType {
  ATTRIBUTION_SIGNAL_TYPE_UNSPECIFIED = 0;
  ATTRIBUTION_SIGNAL_TYPE_OBJECTIVE_COMPLETED = 1;
  ATTRIBUTION_SIGNAL_TYPE_TRACE_COMPLETED = 2;
}

message AttributionQuery {
  string workspace_id = 1;
  string organization_id = 2;
  repeated string deal_ids = 3;
  AttributionModel model = 4;
  google.protobuf.Timestamp start_time = 5;
  google.protobuf.Timestamp end_time = 6;
  bool include_team_rollups = 7;
  repeated string objective_ids = 8;
}

message DealContext {
  string deal_id = 1;
  string title = 2;
  string stage = 3;
  double value = 4;
  string currency = 5;
  string owner_id = 6;
  string contact_id = 7;
  string company_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message ObjectiveContext {
  string objective_id = 1;
  string agent_id = 2;
  string surface = 3;
  string title = 4;
  string description = 5;
  string state = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  google.protobuf.Timestamp completed_at = 9;
}

message TraceTouchpoint {
  traces.v1.TraceSummary trace = 1;
  repeated string match_reasons = 2;
}

message UsageTouchpoint {
  string record_id = 1;
  string request_id = 2;
  string agent_id = 3;
  string team_id = 4;
  string surface = 5;
  string model = 6;
  string provider = 7;
  int64 input_tokens = 8;
  int64 output_tokens = 9;
  double total_cost_usd = 10;
  google.protobuf.Timestamp observed_at = 11;
}

message AgentSummary {
  string agent_id = 1;
  double attribution_weight = 2;
  double attributed_revenue_usd = 3;
  double total_cost_usd = 4;
  double roi_multiple = 5;
  int32 trace_count = 6;
  int32 usage_count = 7;
  repeated string trace_ids = 8;
  repeated string usage_record_ids = 9;
}

message TeamSummary {
  string team_id = 1;
  double attributed_revenue_usd = 2;
  double total_cost_usd = 3;
  double roi_multiple = 4;
  repeated string agent_ids = 5;
}

message ObjectiveAgentSummary {
  string agent_id = 1;
  double attribution_weight = 2;
  double attributed_outcome_count = 3;
  double total_cost_usd = 4;
  int32 trace_count = 5;
  int32 usage_count = 6;
  repeated string trace_ids = 7;
  repeated string usage_record_ids = 8;
}

message ObjectiveTeamSummary {
  string team_id = 1;
  double attribution_weight = 2;
  double attributed_outcome_count = 3;
  double total_cost_usd = 4;
  repeated string agent_ids = 5;
}

message DealAttribution {
  DealContext deal = 1;
  repeated TraceTouchpoint trace_touchpoints = 2;
  repeated UsageTouchpoint usage_touchpoints = 3;
  repeated AgentSummary agent_summaries = 4;
  repeated TeamSummary team_summaries = 5;
  double total_attributed_revenue_usd = 6;
  double total_attributed_cost_usd = 7;
  double unattributed_revenue_usd = 8;
  double unattributed_cost_usd = 9;
}

message ObjectiveOutcomeAttribution {
  ObjectiveContext objective = 1;
  repeated TraceTouchpoint trace_touchpoints = 2;
  repeated UsageTouchpoint usage_touchpoints = 3;
  repeated ObjectiveAgentSummary agent_summaries = 4;
  repeated ObjectiveTeamSummary team_summaries = 5;
  double total_attributed_outcome_count = 6;
  double total_attributed_cost_usd = 7;
  double unattributed_outcome_count = 8;
  double unattributed_cost_usd = 9;
}

message AttributionReport {
  string id = 1;
  AttributionQuery query = 2;
  google.protobuf.Timestamp generated_at = 3;
  repeated DealAttribution deals = 4;
  repeated AgentSummary agent_summaries = 5;
  repeated TeamSummary team_summaries = 6;
  repeated ObjectiveOutcomeAttribution objective_outcomes = 7;
  repeated ObjectiveAgentSummary objective_agent_summaries = 8;
  repeated ObjectiveTeamSummary objective_team_summaries = 9;
}

message AttributionReportSummary {
  string id = 1;
  AttributionQuery query = 2;
  google.protobuf.Timestamp generated_at = 3;
  int32 deal_count = 4;
  int32 agent_count = 5;
  int32 team_count = 6;
  int32 objective_outcome_count = 7;
}

message AttributionSnapshot {
  string id = 1;
  string workspace_id = 2;
  string organization_id = 3;
  AttributionSubjectKind subject_kind = 4;
  string subject_id = 5;
  AttributionModel model = 6;
  AttributionSignalType signal_type = 7;
  string signal_id = 8;
  google.protobuf.Timestamp window_start = 9;
  google.protobuf.Timestamp window_end = 10;
  google.protobuf.Timestamp recorded_at = 11;
  oneof attribution {
    DealAttribution deal = 12;
    ObjectiveOutcomeAttribution objective_outcome = 13;
  }
}

message ObjectiveCompletionSignal {
  string workspace_id = 1;
  string organization_id = 2;
  string objective_id = 3;
  google.protobuf.Timestamp completed_at = 4;
}

message TraceCompletionSignal {
  string workspace_id = 1;
  string organization_id = 2;
  string trace_id = 3;
  google.protobuf.Timestamp completed_at = 4;
}

message AttributionSignal {
  oneof signal {
    ObjectiveCompletionSignal objective_completion = 1;
    TraceCompletionSignal trace_completion = 2;
  }
}

message GenerateReportRequest {
  AttributionQuery query = 1;
}

message GenerateReportResponse {
  AttributionReport report = 1;
}

message GetReportRequest {
  string report_id = 1;
}

message GetReportResponse {
  AttributionReport report = 1;
}

message ListReportsRequest {
  string organization_id = 1;
  string workspace_id = 2;
  AttributionModel model = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message ListReportsResponse {
  repeated AttributionReportSummary reports = 1;
  bool has_more = 2;
}

message ExportReportRequest {
  AttributionQuery query = 1;
  ReportExportFormat format = 2;
}

message ExportReportResponse {
  bytes content = 1;
  string content_type = 2;
  string filename = 3;
}

message RecordSignalsRequest {
  repeated AttributionSignal signals = 1;
  repeated AttributionModel models = 2;
  bool include_team_rollups = 3;
}

message RecordSignalsResponse {
  repeated AttributionSnapshot snapshots = 1;
}

message GetSnapshotRequest {
  string snapshot_id = 1;
}

message GetSnapshotResponse {
  AttributionSnapshot snapshot = 1;
}

message ListSnapshotsRequest {
  string organization_id = 1;
  string workspace_id = 2;
  AttributionSubjectKind subject_kind = 3;
  string subject_id = 4;
  AttributionModel model = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListSnapshotsResponse {
  repeated AttributionSnapshot snapshots = 1;
  bool has_more = 2;
}
