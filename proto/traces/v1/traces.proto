syntax = "proto3";

package traces.v1;

option go_package = "github.com/evalops/proto/gen/go/traces/v1;tracesv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// SpanIngestService records and queries agent execution traces.
service SpanIngestService {
  rpc IngestSpans(IngestSpansRequest) returns (IngestSpansResponse);
  rpc GetTrace(GetTraceRequest) returns (GetTraceResponse);
  rpc ListTraces(ListTracesRequest) returns (ListTracesResponse);
  rpc GetSpanTree(GetSpanTreeRequest) returns (GetSpanTreeResponse);
}

enum SpanStatus {
  SPAN_STATUS_UNSPECIFIED = 0;
  SPAN_STATUS_OK = 1;
  SPAN_STATUS_ERROR = 2;
  SPAN_STATUS_CANCELLED = 3;
}

enum GovernanceDecision {
  GOVERNANCE_DECISION_UNSPECIFIED = 0;
  GOVERNANCE_DECISION_ALLOW = 1;
  GOVERNANCE_DECISION_DENY = 2;
  GOVERNANCE_DECISION_REQUIRE_APPROVAL = 3;
  GOVERNANCE_DECISION_AUTO_APPROVED = 4;
}

message Span {
  string trace_id = 1;
  string span_id = 2;
  string parent_span_id = 3;
  string workspace_id = 4;
  string organization_id = 5;
  string agent_id = 6;
  string surface = 7;
  string name = 8;
  string kind = 9;
  string model = 10;
  string provider = 11;
  int64 token_input = 12;
  int64 token_output = 13;
  int64 latency_ms = 14;
  SpanStatus status = 15;
  GovernanceDecision governance_decision = 16;
  double cost_usd = 17;
  google.protobuf.Struct attributes = 18;
  google.protobuf.Timestamp started_at = 19;
  google.protobuf.Timestamp ended_at = 20;
}

message TraceSummary {
  string trace_id = 1;
  string workspace_id = 2;
  string organization_id = 3;
  string agent_id = 4;
  string surface = 5;
  string root_span_name = 6;
  int32 total_spans = 7;
  int64 total_token_input = 8;
  int64 total_token_output = 9;
  double total_cost_usd = 10;
  int64 total_latency_ms = 11;
  google.protobuf.Timestamp started_at = 12;
  google.protobuf.Timestamp ended_at = 13;
}

message IngestSpansRequest {
  repeated Span spans = 1;
}

message IngestSpansResponse {
  int32 ingested_count = 1;
  repeated TraceSummary traces = 2;
}

message GetTraceRequest {
  string trace_id = 1;
}

message GetTraceResponse {
  TraceSummary trace = 1;
  repeated Span spans = 2;
}

message ListTracesRequest {
  string workspace_id = 1;
  string agent_id = 2;
  string surface = 3;
  google.protobuf.Timestamp start_time = 4;
  google.protobuf.Timestamp end_time = 5;
  int32 limit = 6;
  int32 offset = 7;
}

message ListTracesResponse {
  repeated TraceSummary traces = 1;
  int32 total = 2;
  bool has_more = 3;
}

message GetSpanTreeRequest {
  string trace_id = 1;
}

message SpanNode {
  Span span = 1;
  repeated SpanNode children = 2;
}

message GetSpanTreeResponse {
  TraceSummary trace = 1;
  repeated SpanNode roots = 2;
}
