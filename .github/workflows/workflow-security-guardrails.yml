name: workflow-security-guardrails

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/check-workflow-security-baseline.sh'
      - 'scripts/verify-action-pins.sh'
  push:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - 'scripts/check-workflow-security-baseline.sh'
      - 'scripts/verify-action-pins.sh'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate workflow security baseline
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          CHECK_ALL_WORKFLOWS: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          ENFORCE_SHA_PINS: 'true'
        run: ./scripts/check-workflow-security-baseline.sh

      - name: Verify action SHA pins resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/verify-action-pins.sh
