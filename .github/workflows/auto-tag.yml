name: Auto Tag

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest

    # Skip if only CI/workflow files changed (no contract changes)
    if: >-
      github.event.head_commit.message != '' &&
      !startsWith(github.event.head_commit.message, 'chore(ci)')

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version bump
        id: bump
        run: |
          # Get the latest semver tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "No existing tags found, starting at v0.1.0"
            echo "new_tag=v0.1.0" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Latest tag: $LATEST_TAG"

          # Collect commit messages since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s")
          if [ -z "$COMMITS" ]; then
            echo "No commits since $LATEST_TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          # Check if ALL commits are CI-only (chore(ci), chore(deps) for actions)
          NON_CI_COMMITS=$(echo "$COMMITS" | grep -v -E '^chore\(ci\)' | grep -v -E '^Add CODEOWNERS' || true)
          if [ -z "$NON_CI_COMMITS" ]; then
            echo "Only CI/meta commits since last tag — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level from commit prefixes
          BUMP="patch"

          # feat: or BREAKING CHANGE → minor (pre-1.0 convention)
          if echo "$COMMITS" | grep -qiE '^feat(\(|:)|BREAKING CHANGE'; then
            BUMP="minor"
          fi

          # Parse current version
          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP → $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Check files changed since last tag
        id: files
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            echo "has_contract_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if any non-.github files changed
          CHANGED=$(git diff --name-only "$LATEST_TAG"..HEAD -- . ':!.github' ':!CODEOWNERS' ':!.github/CODEOWNERS')
          if [ -z "$CHANGED" ]; then
            echo "Only .github and meta files changed — skipping tag"
            echo "has_contract_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Contract files changed:"
            echo "$CHANGED"
            echo "has_contract_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.bump.outputs.skip != 'true' && steps.files.outputs.has_contract_changes == 'true'
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"
          echo "Creating tag: $NEW_TAG"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Build tag message from commits since last tag
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            MESSAGE=$(git log "$LATEST_TAG"..HEAD --pretty=format:"- %s" | grep -v -E '^- (Add CODEOWNERS|chore\(ci\))' || echo "- Maintenance release")
          else
            MESSAGE="- Initial semver release"
          fi

          git tag -a "$NEW_TAG" -m "$(printf '%s\n\n%s' "$NEW_TAG" "$MESSAGE")"
          git push origin "$NEW_TAG"

          echo "### Tagged $NEW_TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$MESSAGE" >> "$GITHUB_STEP_SUMMARY"
